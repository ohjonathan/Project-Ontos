name: Golden Master Tests

# TODO: Re-enable after recapturing baselines for v3.0 CLI changes
# Temporarily disabled - baselines were captured with v2.x CLI
on:
  workflow_dispatch:  # Manual trigger only until baselines recaptured
  # push:
  #   branches: [main, v3.0, "v3.0.*"]
  # pull_request:
  #   branches: [main]

jobs:
  golden-master:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml

      - name: Run Golden Master comparison
        run: |
          python tests/golden/compare_golden_master.py --fixture all

      - name: Upload diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: golden-master-diffs-${{ matrix.python-version }}
          path: tests/golden/baselines/
          retention-days: 7
