manifest_version: "2.0.1"
id: project-ontos-issue-165-audit-registry
slug: project-ontos-issue-165-audit-registry
summary: "Establish one schema-validated, deterministic registry for the 100 historical audit findings owned by issue #165, with separate offline and authenticated parity tiers."

lifecycle_mode: framework lifecycle
deliverable_type: standard
user_facing: true
fallback_evidence_mode: strict_p3
require_lifecycle_dispatch_bundles: true
strict_p3_required_phases: ["B.1", "D.2", "D.5"]

owners: ["Project Ontos Maintainers"]
authorship:
  deliverable_author_families: [codex]
  structural_orchestrator_families: [codex]

pre_a:
  entry: proposal
  artifact_path: "docs/reviews/project-ontos-issue-165-audit-registry/pre-a-proposal-verdict.md"

implementation_sequencing:
  mode: spec-first

scope:
  allowed_paths:
    - "AGENTS.md"
    - "Ontos_Context_Map.md"
    - ".github/workflows/audit-registry-parity.yml"
    - "docs/reference/Audit_Remediation_Registry.md"
    - "docs/specs/project-ontos-issue-165-audit-registry-proposal.md"
    - "docs/specs/project-ontos-issue-165-audit-registry-spec.md"
    - "docs/trackers/project-ontos-issue-165-audit-registry.md"
    - "docs/trackers/project-ontos-audit-remediation-release-line.md"
    - "docs/retros/project-ontos-issue-165-audit-registry-retro.md"
    - "manifests/project-ontos-issue-165-audit-registry.yaml"
    - "manifests/project-ontos-audit-remediation-registry.yaml"
    - "schemas/audit-remediation-registry.schema.json"
    - "scripts/validate-audit-remediation-registry.py"
    - "scripts/render-audit-remediation-ledger.py"
    - "tests/test_audit_remediation_registry.py"
  allowed_path_patterns:
    - "docs/reviews/project-ontos-issue-165-audit-registry/**"
  composition_targets:
    - path: "docs/specs/project-ontos-v5-remediation-release-plan-proposal.md"
      rationale: "Read-only inheritance of the approved #165 contract, its v5.1 release gate, and the fixed v5/v6 boundary."
      shares_with_deliverable_id: "project-ontos-v5-remediation-release-plan"
  forbidden_paths:
    - ".github/workflows/ci.yml"
    - ".github/workflows/golden-master.yml"
    - ".github/workflows/publish.yml"
    - ".llm-dev/framework/"
    - ".ontos-internal/"
    - ".venv/"
    - "build/"
    - "dist/"
    - "docs/logs/"
    - "docs/releases/"
    - "ontos/"
    - "pyproject.toml"
    - "site/"
    - "tests/commands/"
    - "tests/core/"
    - "tests/mcp/"
  forbidden_symbols: []
  forbidden_symbol_exemptions: []
  cardinality_assertions:
    - name: "Proposal preserves the approved 100-finding arithmetic"
      command: "grep -Fo '91 + 9 = 100' docs/specs/project-ontos-issue-165-audit-registry-proposal.md | wc -l | tr -d ' '"
      expect: "eq:1"
    - name: "Proposal explicitly separates the #165 and #174 namespaces"
      command: "grep -Fc 'No mapping is inferred between the #165 and #174 namespaces.' docs/specs/project-ontos-issue-165-audit-registry-proposal.md"
      expect: "eq:1"
  cleanliness:
    pathspecs: []
    exclude_pathspecs:
      - "docs/reviews/project-ontos-issue-165-audit-registry/.external/"

artifacts:
  spec: "docs/specs/project-ontos-issue-165-audit-registry-spec.md"
  family_verdict: "docs/reviews/project-ontos-issue-165-audit-registry/<phase>-<family>-<role>.md"
  canonical_verdict: "docs/reviews/project-ontos-issue-165-audit-registry/<phase>-verdict.md"
  product_verdict: "docs/reviews/project-ontos-issue-165-audit-registry/<phase>-<family>-product.md"
  proposal_verdict: "docs/reviews/project-ontos-issue-165-audit-registry/pre-a-proposal-verdict.md"
  fix_summary: "docs/reviews/project-ontos-issue-165-audit-registry/D.4-fix-summary.md"
  verification: "docs/reviews/project-ontos-issue-165-audit-registry/D.5-<family>-verifier.md"
  final_approval: "docs/reviews/project-ontos-issue-165-audit-registry/final-approval.md"
  retro: "docs/retros/project-ontos-issue-165-audit-registry-retro.md"

model_assignments:
  - phase: "-A.proposal"
    assignments: {glm: proposal-reviewer}
  - phase: "A"
    assignments: {codex: spec-author}
  - phase: "B.1"
    assignments: {claude: peer, gemini: alignment, glm: adversarial}
  - phase: "B.1"
    assignments: {claude: product}
  - phase: "B.2"
    assignments: {claude: alignment, gemini: peer, glm: adversarial}
  - phase: "B.2"
    assignments: {claude: product}
  - phase: "B.3"
    assignments: {claude: meta-consolidator}
  - phase: "C"
    assignments: {codex: implementation-author}
  - phase: "D.1"
    assignments: {claude: peer}
  - phase: "D.2"
    assignments: {claude: peer, gemini: adversarial, glm: alignment}
  - phase: "D.2"
    assignments: {claude: product}
  - phase: "D.3"
    assignments: {claude: meta-consolidator}
  - phase: "D.4"
    assignments: {codex: fix-author}
  - phase: "D.5"
    assignments: {claude: verifier, gemini: verifier, glm: verifier}
  - phase: "D.6"
    assignments: {codex: final-approval}
  - phase: "E"
    assignments: {codex: retro}

cli_capability_matrix:
  codex: {shell: true, git: true, test_runner: true, doc_index: true}
  claude: {shell: true, git: true, test_runner: true, doc_index: true}
  gemini:
    shell: false
    git: false
    test_runner: false
    doc_index: true
    evidence_cap: static-inspection
    writes_files_non_interactively: false
  glm: {shell: true, git: true, test_runner: true, doc_index: true}

smoke_checks:
  - phase: "-A.proposal"
    checks:
      - name: "Proposal frontmatter and document dependencies resolve"
        command: 'PYTHONPATH=. "${ONTOS_PYTHON}" -m ontos link-check --frontmatter-only --json'
        expect: "exit-0"
      - name: "Proposal scaffold has no whitespace errors"
        command: "git diff --check"
        expect: "exit-0"
      - name: "Manifest conforms to the pinned adopter framework"
        command: "scripts/llm-dev verify manifests/project-ontos-issue-165-audit-registry.yaml"
        expect: "exit-0"

regression_guards: []
sibling_deliverable_ids: []
review_rounds: []
reviewer_family_substitutes: []
self_review_caveats: []
consolidation_mode: external

lifecycle_receipt_inventory_path: "docs/reviews/project-ontos-issue-165-audit-registry/lifecycle-receipt-inventory.yaml"
required_dispatch_bundles:
  - phase: "B.1"
    intent_path: "docs/reviews/project-ontos-issue-165-audit-registry/B.1-dispatch-intent.yaml"
    result_path: "docs/reviews/project-ontos-issue-165-audit-registry/B.1-dispatch-result.yaml"
  - phase: "B.2"
    intent_path: "docs/reviews/project-ontos-issue-165-audit-registry/B.2-dispatch-intent.yaml"
    result_path: "docs/reviews/project-ontos-issue-165-audit-registry/B.2-dispatch-result.yaml"
  - phase: "D.2"
    intent_path: "docs/reviews/project-ontos-issue-165-audit-registry/D.2-dispatch-intent.yaml"
    result_path: "docs/reviews/project-ontos-issue-165-audit-registry/D.2-dispatch-result.yaml"
  - phase: "D.5"
    intent_path: "docs/reviews/project-ontos-issue-165-audit-registry/D.5-dispatch-intent.yaml"
    result_path: "docs/reviews/project-ontos-issue-165-audit-registry/D.5-dispatch-result.yaml"

merge_authority:
  mode: recommendation_only

cross_repo_dependencies: []
historical_receipt_gaps: []
gate_only_invariants: []
convergence_metrics: []

gate_env:
  - name: ONTOS_PYTHON
    description: "Python interpreter containing the repository development dependencies."
    example: "ONTOS_PYTHON=.venv/bin/python"
    required: true
    scope: both
  - name: CHILD_BASE_SHA
    description: "Full immutable commit SHA captured when the dedicated child branch is opened and persisted in its handoff or receipt."
    example: "CHILD_BASE_SHA=<40-hex-commit-sha>"
    required: true
    scope: gate

gate_prerequisites:
  - id: G-test-1
    category: test
    description: "The child documentation graph resolves without frontmatter errors."
    verification:
      command: 'PYTHONPATH=. "${ONTOS_PYTHON}" -m ontos link-check --frontmatter-only --json'
      expect: "exit-0"
  - id: G-scope-1
    category: scope
    description: "Changed paths remain within the #165 registry scope from its recorded immutable base."
    verification:
      command: 'test -n "${CHILD_BASE_SHA:-}" && test "$(git rev-parse --verify "${CHILD_BASE_SHA}^{commit}" 2>/dev/null)" = "${CHILD_BASE_SHA}" && bash .llm-dev/framework/scripts/verify-changed-path-scope.sh --manifest manifests/project-ontos-issue-165-audit-registry.yaml --base "${CHILD_BASE_SHA}"'
      expect: "exit-0"
  - id: G-cardinality-1
    category: cardinality
    description: "The approved 91-plus-9 arithmetic and namespace separation remain explicit."
    verification:
      command: "test \"$(grep -Fo '91 + 9 = 100' docs/specs/project-ontos-issue-165-audit-registry-proposal.md | wc -l | tr -d ' ')\" = 1 && test \"$(grep -Fc 'No mapping is inferred between the #165 and #174 namespaces.' docs/specs/project-ontos-issue-165-audit-registry-proposal.md)\" = 1"
      expect: "exit-0"
  - id: G-verdict-1
    category: verdict-presence
    description: "A non-author Template 16 proposal verdict exists."
    verification:
      command: "test -f docs/reviews/project-ontos-issue-165-audit-registry/pre-a-proposal-verdict.md"
      expect: "exit-0"
  - id: G-verdict-2
    category: verdict-presence
    description: "Canonical B.3/D.3 verdicts and three D.5 verifier artifacts exist before final approval."
    verification:
      command: "test -f docs/reviews/project-ontos-issue-165-audit-registry/B.3-verdict.md && test -f docs/reviews/project-ontos-issue-165-audit-registry/D.3-verdict.md && test \"$(find docs/reviews/project-ontos-issue-165-audit-registry -name 'D.5-*-verifier.md' | wc -l | tr -d ' ')\" = 3"
      expect: "exit-0"
  - id: G-blocker-1
    category: blocker-closure
    description: "The exact non-author Pre-A disposition authorizes Phase A."
    verification:
      command: "grep -Eq '^- \\*\\*Overall verdict:\\*\\* Proceed to Phase A$' docs/reviews/project-ontos-issue-165-audit-registry/pre-a-proposal-verdict.md"
      expect: "exit-0"
  - id: G-blocker-2
    category: blocker-closure
    description: "No preserved implementation blocker remains in the canonical D.3 verdict."
    verification:
      command: "test -f docs/reviews/project-ontos-issue-165-audit-registry/D.3-verdict.md && ! grep -q 'status: preserved' docs/reviews/project-ontos-issue-165-audit-registry/D.3-verdict.md"
      expect: "exit-0"
  - id: G-branch-1
    category: branch
    description: "Work runs on the dedicated #165 registry child branch descended from its recorded immutable base."
    verification:
      command: 'test -n "${CHILD_BASE_SHA:-}" && test "$(git branch --show-current)" = "codex/project-ontos-issue-165-audit-registry" && test "$(git rev-parse --verify "${CHILD_BASE_SHA}^{commit}" 2>/dev/null)" = "${CHILD_BASE_SHA}" && test "$(git merge-base "${CHILD_BASE_SHA}" HEAD)" = "${CHILD_BASE_SHA}"'
      expect: "exit-0"
  - id: G-branch-2
    category: branch
    description: "Deliverable-owned paths are clean after commit."
    verification:
      command: "bash .llm-dev/framework/scripts/clean-tree-scoped.sh --manifest manifests/project-ontos-issue-165-audit-registry.yaml"
      expect: "exit-0"

tracker:
  path: "docs/trackers/project-ontos-issue-165-audit-registry.md"
  columns: [phase, owner, status, artifact, evidence, timestamp]

branch_map:
  default: "codex/project-ontos-issue-165-audit-registry"

references:
  - path: "docs/specs/project-ontos-v5-remediation-release-plan-proposal.md"
    relevance: "Approved #165 scope, v5.1 release-gate dependency, and fixed v5/v6 boundary."
  - path: "docs/reviews/2026-07-02-fable-repo-audit.md"
    relevance: "Source inventory for the 91 Fable findings."
  - path: "docs/reviews/2026-07-10-codex-audit-revalidation.md"
    relevance: "Source inventory for the 9 Round-2 findings and the registry/parity gap."
  - path: "docs/reviews/project-ontos-v5-remediation-release-plan/phase-0-live-issue-audit.md"
    relevance: "Fresh read-only confirmation that #165 remains open and still needs board reconciliation."
  - path: "docs/trackers/project-ontos-audit-remediation-release-line.md"
    relevance: "Current human-maintained O4 projection that this registry will replace as mutable authority."

watch_item: >-
  The registry must remain the sole mutable audit authority for exactly 100
  curated historical IDs while the checked-in O4 ledger is a deterministic
  projection. The #165 curated-finding namespace remains distinct from #174
  runtime finding IDs; no inferred mapping, renumbering, or data deletion may
  make validation green. Offline validation and rendering must work without
  credentials, authenticated live parity must be read-only, and this child may
  not mutate GitHub issues. The deliverable blocks v5.1, must preserve v5
  compatibility, and cannot broaden v6 beyond deletion of the exact eleven
  deprecated path-compatibility names.
