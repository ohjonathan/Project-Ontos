manifest_version: "2.0.1"
id: project-ontos-audit-tail-docs
slug: project-ontos-audit-tail-docs
summary: "Resolve the seven audit-tail documentation findings and begin the inherited generated-artifact churn cleanup for v5.0.1."

lifecycle_mode: framework lifecycle
deliverable_type: standard
user_facing: true
fallback_evidence_mode: strict_p3
require_lifecycle_dispatch_bundles: true
strict_p3_required_phases: ["B.1", "D.2", "D.5"]

owners: ["Project Ontos Maintainers"]
authorship:
  deliverable_author_families: [codex]
  structural_orchestrator_families: [codex]

implementation_sequencing:
  mode: code-first-user-gated
  user_gate_ref: "Maintainer-approved close-the-audit-tail execution plan; Phase 0 PR #166 merged before this branch."
  implementation_ref: "codex/audit-tail-docs from origin/main@bbbad203ee826a1994f609890e6a70fb7dbe7a34"
  rationale: "The maintainer supplied a decision-complete PR A contract and requested sequential implementation with review after each PR."

scope:
  allowed_paths:
    - "docs/reference/Ontos_Agent_Instructions.md"
    - "docs/reference/Ontos_Manual.md"
    - "docs/reference/Architecture.md"
    - "docs/specs/project-ontos-audit-tail-docs-spec.md"
    - "docs/trackers/project-ontos-audit-tail-docs.md"
    - "docs/retros/project-ontos-audit-tail-docs-retro.md"
    - "manifests/project-ontos-audit-tail-docs.yaml"
    - "ontos/core/instruction_protocol.py"
    - "ontos/core/instruction_artifacts.py"
    - "ontos/commands/map.py"
    - "tests/commands/test_instruction_protocol.py"
    - "tests/commands/test_agents.py"
    - "tests/commands/test_export_phase4.py"
    - "tests/commands/test_export_all.py"
    - "tests/commands/test_instruction_artifact_policy.py"
    - "tests/commands/test_map.py"
    - "tests/commands/test_map_resilience.py"
    - "tests/commands/test_map_recent_activity.py"
    - "tests/commands/test_maintain.py"
    - "tests/test_map_compact.py"
    - "README.md"
    - "Ontos_Context_Map.md"
    - "AGENTS.md"
    - ".cursorrules"
    - "CLAUDE.md"
    - ".gitattributes"
  allowed_path_patterns:
    - "docs/reviews/project-ontos-audit-tail-docs/**"
    - "docs/logs/*audit-tail-docs*.md"
    - "tests/golden/baselines/*/context_map.md"
  composition_targets:
    - path: "docs/reviews/2026-07-02-fable-repo-audit.md"
      rationale: "Read-only source for D8-docs-clarity-1/2/3/4/5/6/8 evidence and acceptance intent."
      shares_with_deliverable_id: "project-ontos-audit-remediation-2026-07"
    - path: "docs/trackers/project-ontos-audit-remediation-release-line.md"
      rationale: "Read-only source for the sequential release split and current 8/25 reconciliation."
      shares_with_deliverable_id: "project-ontos-audit-tail-bookkeeping"
  forbidden_paths:
    - ".github/"
    - "pyproject.toml"
    - "docs/releases/"
    - ".ontos-internal/archive/"
    - ".project-internal/"
    - "ontos/core/paths.py"
    - "ontos/mcp/"
    - ".llm-dev/framework/"
    - ".venv/"
    - "dist/"
    - "build/"
  forbidden_symbols: []
  cardinality_assertions:
    - name: "All three generated instruction files use a valid query form"
      command: "${ONTOS_PYTHON} -c 'from pathlib import Path; files=[Path(\"AGENTS.md\"),Path(\".cursorrules\"),Path(\"CLAUDE.md\")]; assert all(\"ontos query --depends-on <id>\" in p.read_text() for p in files); assert all(\"ontos query <id>\" not in p.read_text() for p in files)'"
      expect: "exit-0"
    - name: "Exactly one repository artifact is marked linguist-generated"
      command: "${ONTOS_PYTHON} -c 'from pathlib import Path; lines=[x for x in Path(\".gitattributes\").read_text().splitlines() if \"linguist-generated=true\" in x and not x.lstrip().startswith(\"#\")]; assert lines == [\"Ontos_Context_Map.md linguist-generated=true\"]'"
      expect: "exit-0"
    - name: "Architecture reference is indexed"
      command: "${ONTOS_PYTHON} -c 'from pathlib import Path; p=Path(\"docs/reference/Architecture.md\"); assert p.is_file() and \"id: ontos_architecture\" in p.read_text()'"
      expect: "exit-0"
  cleanliness:
    pathspecs: []
    exclude_pathspecs: ["review-board/.external/"]

artifacts:
  spec: "docs/specs/project-ontos-audit-tail-docs-spec.md"
  family_verdict: "docs/reviews/project-ontos-audit-tail-docs/<phase>-<family>-<role>.md"
  canonical_verdict: "docs/reviews/project-ontos-audit-tail-docs/<phase>-verdict.md"
  product_verdict: "docs/reviews/project-ontos-audit-tail-docs/<phase>-<family>-product.md"
  fix_summary: "docs/reviews/project-ontos-audit-tail-docs/D.4-fix-summary.md"
  verification: "docs/reviews/project-ontos-audit-tail-docs/D.5-<family>-verifier.md"
  final_approval: "docs/reviews/project-ontos-audit-tail-docs/final-approval.md"
  retro: "docs/retros/project-ontos-audit-tail-docs-retro.md"

model_assignments:
  - phase: "A"
    assignments: {codex: spec-author}
  - phase: "B.1"
    assignments: {claude: adversarial, gemini: alignment, glm: peer}
  - phase: "B.1"
    assignments: {claude: product}
  - phase: "B.2"
    assignments: {claude: alignment, gemini: peer, glm: adversarial}
  - phase: "B.2"
    assignments: {claude: product}
  - phase: "B.3"
    assignments: {codex: meta-consolidator}
  - phase: "C"
    assignments: {codex: implementation-author}
  - phase: "D.1"
    assignments: {claude: peer}
  - phase: "D.2"
    assignments: {claude: peer, gemini: adversarial, glm: alignment}
  - phase: "D.2"
    assignments: {claude: product}
  - phase: "D.3"
    assignments: {codex: meta-consolidator}
  - phase: "D.4"
    assignments: {codex: fix-author}
  - phase: "D.5"
    assignments: {claude: verifier, gemini: verifier, glm: verifier}
  - phase: "D.6"
    assignments: {codex: final-approval}
  - phase: "E"
    assignments: {codex: retro}

cli_capability_matrix:
  codex: {shell: true, git: true, test_runner: true, doc_index: true}
  claude: {shell: true, git: true, test_runner: true, doc_index: true}
  gemini:
    shell: false
    git: false
    test_runner: false
    doc_index: true
    evidence_cap: static-inspection
    writes_files_non_interactively: false
  glm: {shell: true, git: true, test_runner: true, doc_index: true}

smoke_checks:
  - phase: "C"
    checks:
      - name: "PR A focused regressions"
        command: "PYTHONPATH=. ${ONTOS_PYTHON} -m pytest -q tests/commands/test_instruction_protocol.py tests/commands/test_instruction_artifact_policy.py tests/commands/test_agents.py tests/commands/test_export_all.py tests/commands/test_export_phase4.py tests/commands/test_map.py tests/commands/test_map_resilience.py tests/commands/test_map_recent_activity.py tests/commands/test_maintain.py tests/test_map_compact.py"
        expect: "exit-0"
      - name: "Complete Ontos suite"
        command: "PYTHONPATH=. ${ONTOS_PYTHON} -m pytest -q"
        expect: "exit-0"
      - name: "Document graph is valid"
        command: "${ONTOS_PYTHON} -m ontos link-check --no-orphans --quiet"
        expect: "exit-0"
  - phase: "D.5"
    checks:
      - name: "Post-review complete suite"
        command: "PYTHONPATH=. ${ONTOS_PYTHON} -m pytest -q"
        expect: "exit-0"

regression_guards: []
sibling_deliverable_ids: []
review_rounds: []
reviewer_family_substitutes: []
consolidation_mode: fast-path
self_review_caveats:
  - family: codex
    phases: ["D.3"]
    rationale: "Codex implements the maintainer-approved slice and only consolidates independent review evidence; D.5 remains non-author."

lifecycle_receipt_inventory_path: "docs/reviews/project-ontos-audit-tail-docs/lifecycle-receipt-inventory.yaml"
required_dispatch_bundles:
  - phase: "B.1"
    intent_path: "docs/reviews/project-ontos-audit-tail-docs/B.1-dispatch-intent.yaml"
    result_path: "docs/reviews/project-ontos-audit-tail-docs/B.1-dispatch-result.yaml"
  - phase: "B.2"
    intent_path: "docs/reviews/project-ontos-audit-tail-docs/B.2-dispatch-intent.yaml"
    result_path: "docs/reviews/project-ontos-audit-tail-docs/B.2-dispatch-result.yaml"
  - phase: "D.2"
    intent_path: "docs/reviews/project-ontos-audit-tail-docs/D.2-dispatch-intent.yaml"
    result_path: "docs/reviews/project-ontos-audit-tail-docs/D.2-dispatch-result.yaml"
  - phase: "D.5"
    intent_path: "docs/reviews/project-ontos-audit-tail-docs/D.5-dispatch-intent.yaml"
    result_path: "docs/reviews/project-ontos-audit-tail-docs/D.5-dispatch-result.yaml"

merge_authority:
  mode: recommendation_only

cross_repo_dependencies: []
historical_receipt_gaps: []
gate_only_invariants: []
convergence_metrics: []

gate_env:
  - name: ONTOS_PYTHON
    description: "Python interpreter with the repository development and test dependencies installed."
    example: "ONTOS_PYTHON=/Users/jonathanoh/Developer/workspaces/Project-Ontos/.venv/bin/python"
    required: true
    scope: both

gate_prerequisites:
  - id: G-test-1
    category: test
    description: "The focused PR A regression suite passes."
    verification: {command: "PYTHONPATH=. ${ONTOS_PYTHON} -m pytest -q tests/commands/test_instruction_protocol.py tests/commands/test_instruction_artifact_policy.py tests/commands/test_agents.py tests/commands/test_export_all.py tests/commands/test_export_phase4.py tests/commands/test_map.py tests/commands/test_map_resilience.py tests/commands/test_map_recent_activity.py tests/commands/test_maintain.py tests/test_map_compact.py", expect: "exit-0"}
  - id: G-test-2
    category: test
    description: "The complete Ontos suite passes."
    verification: {command: "PYTHONPATH=. ${ONTOS_PYTHON} -m pytest -q", expect: "exit-0"}
  - id: G-scope-1
    category: scope
    description: "No later-phase release, workflow, archive, config, provenance, or breaking-path surface changes."
    verification: {command: "git diff --name-only origin/main -- .github pyproject.toml docs/releases .ontos-internal/archive .project-internal ontos/core/paths.py ontos/mcp", expect: "empty"}
  - id: G-cardinality-1
    category: cardinality
    description: "All generated instruction files use the valid depends-on query form."
    verification: {command: "${ONTOS_PYTHON} -c 'from pathlib import Path; ps=[Path(\"AGENTS.md\"),Path(\".cursorrules\"),Path(\"CLAUDE.md\")]; assert all(\"ontos query --depends-on <id>\" in p.read_text() and \"ontos query <id>\" not in p.read_text() for p in ps)'", expect: "exit-0"}
  - id: G-cardinality-2
    category: cardinality
    description: "Only the context map is marked as generated in repository attributes."
    verification: {command: "${ONTOS_PYTHON} -c 'from pathlib import Path; ls=[x for x in Path(\".gitattributes\").read_text().splitlines() if \"linguist-generated=true\" in x and not x.lstrip().startswith(\"#\")]; assert ls == [\"Ontos_Context_Map.md linguist-generated=true\"]'", expect: "exit-0"}
  - id: G-verdict-1
    category: verdict-presence
    description: "Canonical B.3/D.3 verdicts and three D.5 verifier artifacts exist."
    verification: {command: "test -f docs/reviews/project-ontos-audit-tail-docs/B.3-verdict.md && test -f docs/reviews/project-ontos-audit-tail-docs/D.3-verdict.md && test \"$(find docs/reviews/project-ontos-audit-tail-docs -name 'D.5-*-verifier.md' | wc -l | tr -d ' ')\" = 3", expect: "exit-0"}
  - id: G-blocker-1
    category: blocker-closure
    description: "No preserved blocker remains in the canonical D.3 verdict."
    verification: {command: "test -f docs/reviews/project-ontos-audit-tail-docs/D.3-verdict.md && ! grep -q 'status: preserved' docs/reviews/project-ontos-audit-tail-docs/D.3-verdict.md", expect: "exit-0"}
  - id: G-branch-1
    category: branch
    description: "The branch remains based on the current origin/main review baseline."
    verification: {command: "test \"$(git merge-base origin/main HEAD)\" = \"$(git rev-parse origin/main)\"", expect: "exit-0"}

tracker:
  path: "docs/trackers/project-ontos-audit-tail-docs.md"
  columns: [phase, owner, status, artifact, evidence, timestamp]

branch_map:
  default: "codex/audit-tail-docs"

references:
  - path: "docs/reviews/2026-07-02-fable-repo-audit.md"
    relevance: "Original evidence for the seven PR A findings."
  - path: "docs/trackers/project-ontos-audit-remediation-release-line.md"
    relevance: "Authoritative release split and sequential merge gate."

watch_item: "This PR may resolve only D8-docs-clarity-1/2/3/4/5/6/8 and the PR A portion of inherited D5a-repo-redundancy-7. Version, release, unrelated cleanup, issue closure, merge, tag, and publication actions remain out of scope."
