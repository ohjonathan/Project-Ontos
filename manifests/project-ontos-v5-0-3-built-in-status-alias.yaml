manifest_version: "2.0.1"
id: project-ontos-v5-0-3-built-in-status-alias
slug: project-ontos-v5-0-3-built-in-status-alias
summary: "Pre-A child for the single protected v5.0.3 status repair alias required by issue #178."

deliverable_type: standard
user_facing: true
lifecycle_mode: framework lifecycle

owners:
  - "Project Ontos Maintainers"

authorship:
  deliverable_author_families:
    - codex
  structural_orchestrator_families:
    - codex

pre_a:
  entry: proposal
  artifact_path: "docs/reviews/project-ontos-v5-0-3-built-in-status-alias/pre-a-proposal-verdict.md"

scope:
  allowed_paths:
    - "AGENTS.md"
    - "Ontos_Context_Map.md"
    - "docs/reference/Ontos_Manual.md"
    - "docs/specs/project-ontos-v5-0-3-built-in-status-alias-proposal.md"
    - "docs/specs/project-ontos-v5-0-3-built-in-status-alias-spec.md"
    - "docs/trackers/project-ontos-v5-0-3-built-in-status-alias.md"
    - "docs/retros/project-ontos-v5-0-3-built-in-status-alias-retro.md"
    - "manifests/project-ontos-v5-0-3-built-in-status-alias.yaml"
    - "ontos/core/frontmatter_repair.py"
    - "tests/core/test_frontmatter_repair.py"
    - "tests/commands/test_maintain.py"
  allowed_path_patterns:
    - "docs/reviews/project-ontos-v5-0-3-built-in-status-alias/**"
  composition_targets:
    - path: "docs/specs/project-ontos-v5-remediation-release-plan-proposal.md"
      rationale: "The child narrows and composes the approved parent release boundary without owning or revising the program charter."
      shares_with_deliverable_id: "project-ontos-v5-remediation-release-plan"
  forbidden_paths:
    - ".github/"
    - "build/"
    - "dist/"
    - "docs/logs/"
    - "ontos/core/config.py"
    - "ontos/core/types.py"
    - "ontos/io/config.py"
    - "ontos/mcp/"
    - "pyproject.toml"
    - "site/"
    - "tests/io/test_config_phase3.py"
  forbidden_symbols: []
  forbidden_symbol_exemptions: []
  cardinality_assertions:
    - name: "Implementation contains exactly one protected status mapping"
      command: "grep -cE '^[[:space:]]*\"in-progress\":[[:space:]]*\"in_progress\",?$' ontos/core/frontmatter_repair.py"
      expect: "eq:1"
    - name: "Proposal freezes exactly one arrow-form mapping"
      command: "grep -cE '^in-progress -> in_progress$' docs/specs/project-ontos-v5-0-3-built-in-status-alias-proposal.md"
      expect: "eq:1"
  cleanliness:
    pathspecs: []
    exclude_pathspecs:
      - "docs/reviews/project-ontos-v5-0-3-built-in-status-alias/.external/"

artifacts:
  spec: "docs/specs/project-ontos-v5-0-3-built-in-status-alias-spec.md"
  family_verdict: "docs/reviews/project-ontos-v5-0-3-built-in-status-alias/<phase>-<family>-<role>.md"
  canonical_verdict: "docs/reviews/project-ontos-v5-0-3-built-in-status-alias/<phase>-verdict.md"
  product_verdict: "docs/reviews/project-ontos-v5-0-3-built-in-status-alias/<phase>-<family>-product.md"
  proposal_verdict: "docs/reviews/project-ontos-v5-0-3-built-in-status-alias/pre-a-proposal-verdict.md"
  fix_summary: "docs/reviews/project-ontos-v5-0-3-built-in-status-alias/D.4-fix-summary.md"
  verification: "docs/reviews/project-ontos-v5-0-3-built-in-status-alias/D.5-<family>-verifier.md"
  final_approval: "docs/reviews/project-ontos-v5-0-3-built-in-status-alias/final-approval.md"
  retro: "docs/retros/project-ontos-v5-0-3-built-in-status-alias-retro.md"

model_assignments:
  - phase: "-A.proposal"
    assignments:
      glm: proposal-reviewer
  - phase: "A"
    assignments:
      codex: spec-author
  - phase: "B.1"
    assignments:
      claude-opus: peer
      claude-sonnet: alignment
      gemini: adversarial
  - phase: "B.1"
    assignments:
      glm: product
  - phase: "B.2"
    assignments:
      claude-sonnet: peer
      gemini: alignment
      claude-opus: adversarial
  - phase: "B.2"
    assignments:
      glm: product
  - phase: "B.3"
    assignments:
      claude-opus: meta-consolidator
  - phase: "C"
    assignments:
      codex: implementation-author
  - phase: "D.1"
    assignments:
      claude-opus: peer
  - phase: "D.2"
    assignments:
      claude-sonnet: peer
      gemini: alignment
      claude-opus: adversarial
  - phase: "D.2"
    assignments:
      glm: product
  - phase: "D.3"
    assignments:
      claude-sonnet: meta-consolidator
  - phase: "D.4"
    assignments:
      codex: fix-author
  - phase: "D.5"
    assignments:
      claude-opus: verifier
      claude-sonnet: verifier
      gemini: verifier
  - phase: "D.6"
    assignments:
      claude-opus: final-approval
  - phase: "E"
    assignments:
      glm: retro

cli_capability_matrix:
  codex:
    shell: true
    git: true
    test_runner: true
    doc_index: true
  claude-opus:
    shell: true
    git: true
    test_runner: true
    doc_index: true
  claude-sonnet:
    shell: true
    git: true
    test_runner: true
    doc_index: true
  gemini:
    shell: false
    git: false
    test_runner: false
    doc_index: true
    evidence_cap: static-inspection
    writes_files_non_interactively: false
    expected_version_regex: "^[0-9]+[.][0-9]+[.][0-9]+"
  glm:
    shell: false
    git: false
    test_runner: false
    doc_index: true
    evidence_cap: static-inspection
    writes_files_non_interactively: false

smoke_checks:
  - phase: "-A.proposal"
    checks:
      - name: "Proposal frontmatter and document graph are valid"
        command: 'PYTHONPATH=. "${ONTOS_PYTHON}" -m ontos link-check --frontmatter-only --json'
        expect: "exit-0"
      - name: "Manifest conforms to the pinned framework"
        command: "scripts/llm-dev verify manifests/project-ontos-v5-0-3-built-in-status-alias.yaml"
        expect: "exit-0"
  - phase: "C"
    checks:
      - name: "Focused repair tests pass"
        command: 'PYTHONPATH=. "${ONTOS_PYTHON}" -m pytest -q tests/core/test_frontmatter_repair.py tests/commands/test_maintain.py'
        expect: "exit-0"

regression_guards: []
sibling_deliverable_ids: []
review_rounds: []
self_review_caveats: []
consolidation_mode: external
implementation_sequencing:
  mode: spec-first
reviewer_family_substitutes: []
gate_env:
  - name: ONTOS_PYTHON
    description: "Python interpreter with Project Ontos development dependencies."
    example: "ONTOS_PYTHON=.venv/bin/python"
    required: true
    scope: both
  - name: CHILD_BASE_SHA
    description: "Full immutable commit SHA captured when the dedicated child worktree is created after Pre-A approval and persisted in its handoff or receipt."
    example: "CHILD_BASE_SHA=<40-hex-commit-sha>"
    required: true
    scope: gate

lifecycle_receipt_inventory_path: "docs/reviews/project-ontos-v5-0-3-built-in-status-alias/lifecycle-receipt-inventory.yaml"

merge_authority:
  mode: recommendation_only

cross_repo_dependencies: []
historical_receipt_gaps: []
gate_only_invariants: []
convergence_metrics: []

gate_prerequisites:
  - id: G-test-1
    category: test
    description: "The focused frontmatter repair and maintain-command tests pass."
    verification:
      command: 'PYTHONPATH=. "${ONTOS_PYTHON}" -m pytest -q tests/core/test_frontmatter_repair.py tests/commands/test_maintain.py'
      expect: "exit-0"
  - id: G-scope-1
    category: scope
    description: "Future implementation gate: the child changes only its declared status-alias surface from its recorded immutable base."
    verification:
      command: 'test -n "${CHILD_BASE_SHA:-}" && test "$(git rev-parse --verify "${CHILD_BASE_SHA}^{commit}" 2>/dev/null)" = "${CHILD_BASE_SHA}" && bash .llm-dev/framework/scripts/verify-changed-path-scope.sh --manifest manifests/project-ontos-v5-0-3-built-in-status-alias.yaml --base "${CHILD_BASE_SHA}"'
      expect: "exit-0"
  - id: G-cardinality-1
    category: cardinality
    description: "Exactly one protected built-in mapping is introduced."
    verification:
      command: "grep -cE '^[[:space:]]*\"in-progress\":[[:space:]]*\"in_progress\",?$' ontos/core/frontmatter_repair.py"
      expect: "eq:1"
  - id: G-verdict-1
    category: verdict-presence
    description: "A non-author GLM Template 16 proposal verdict exists."
    verification:
      command: "test -f docs/reviews/project-ontos-v5-0-3-built-in-status-alias/pre-a-proposal-verdict.md"
      expect: "exit-0"
  - id: G-blocker-1
    category: blocker-closure
    description: "Pre-A explicitly authorizes Phase A before a specification is drafted."
    verification:
      command: 'grep -Eq "^- \*\*Overall verdict:\*\* Proceed to Phase A$" docs/reviews/project-ontos-v5-0-3-built-in-status-alias/pre-a-proposal-verdict.md'
      expect: "exit-0"
  - id: G-branch-1
    category: branch
    description: "Future child work runs on its dedicated branch descended from the recorded immutable base."
    verification:
      command: 'test -n "${CHILD_BASE_SHA:-}" && test "$(git branch --show-current)" = "codex/project-ontos-v5-0-3-built-in-status-alias" && test "$(git rev-parse --verify "${CHILD_BASE_SHA}^{commit}" 2>/dev/null)" = "${CHILD_BASE_SHA}" && test "$(git merge-base "${CHILD_BASE_SHA}" HEAD)" = "${CHILD_BASE_SHA}"'
      expect: "exit-0"

tracker:
  path: "docs/trackers/project-ontos-v5-0-3-built-in-status-alias.md"
  columns: [phase, owner, status, artifact, evidence, timestamp]

branch_map:
  default: "codex/project-ontos-v5-0-3-built-in-status-alias"

references:
  - path: "docs/specs/project-ontos-v5-remediation-release-plan-proposal.md"
    relevance: "Approved parent release boundary and exact v5.0.3 alias contract."
  - path: "ontos/core/frontmatter_repair.py"
    relevance: "Current conservative plan/apply engine and protected repair tables."
  - path: "tests/core/test_frontmatter_repair.py"
    relevance: "Current formatting, original-value, and transactional repair evidence."
  - path: "docs/reference/Ontos_Manual.md"
    relevance: "Public conservative enum-repair behavior."

watch_item: "This child may add exactly the protected built-in status repair from 'in-progress' to 'in_progress'. It must remain plan-first, formatting-safe, transactional, and preserve original_status without overwriting an existing value. It must not add arbitrary guessing, workspace-defined aliases, custom vocabulary, dynamic enums, or any other #178 surface. Issue #178 remains open for complete v5.1 delivery. Any broader mapping or any claim that this child closes #178 is a BREACH."
