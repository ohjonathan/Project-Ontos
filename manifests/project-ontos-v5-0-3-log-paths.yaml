manifest_version: "2.0.1"
id: project-ontos-v5-0-3-log-paths
slug: project-ontos-v5-0-3-log-paths
summary: "Centralize active, archive, and history log-path authority while preserving seven deprecated public path helpers for Ontos v5.0.3."

deliverable_type: standard
user_facing: true
lifecycle_mode: framework lifecycle
fallback_evidence_mode: strict_p3
require_lifecycle_dispatch_bundles: true
strict_p3_required_phases: ["B.1", "D.2", "D.5"]

owners: ["Project Ontos Maintainers"]
authorship:
  deliverable_author_families: [codex]
  structural_orchestrator_families: [codex]

pre_a:
  entry: proposal
  artifact_path: "docs/reviews/project-ontos-v5-0-3-log-paths/pre-a-proposal-verdict.md"

scope:
  allowed_paths:
    - "AGENTS.md"
    - "Ontos_Context_Map.md"
    - "docs/specs/project-ontos-v5-0-3-log-paths-proposal.md"
    - "docs/specs/project-ontos-v5-0-3-log-paths-spec.md"
    - "docs/trackers/project-ontos-v5-0-3-log-paths.md"
    - "docs/retros/project-ontos-v5-0-3-log-paths-retro.md"
    - "docs/reference/Ontos_Manual.md"
    - "docs/reference/Ontos_Agent_Instructions.md"
    - "docs/reference/ontology_spec.md"
    - "docs/releases/v5.0.3.md"
    - "manifests/project-ontos-v5-0-3-log-paths.yaml"
    - "ontos/core/log_paths.py"
    - "ontos/core/paths.py"
    - "ontos/core/history.py"
    - "ontos/core/instruction_artifacts.py"
    - "ontos/commands/activate.py"
    - "ontos/commands/agents.py"
    - "ontos/commands/consolidate.py"
    - "ontos/commands/doctor.py"
    - "ontos/commands/log.py"
    - "ontos/commands/maintain.py"
    - "ontos/commands/map.py"
    - "ontos/mcp/cache.py"
    - "ontos/mcp/tools.py"
    - "ontos/mcp/writes.py"
    - "tests/core/test_resolved_log_paths.py"
    - "tests/core/test_paths_runtime_root.py"
    - "tests/core/test_paths_v2_deprecation.py"
    - "tests/commands/test_activate_json_warning_metadata.py"
    - "tests/commands/test_agents.py"
    - "tests/commands/test_consolidate_parity.py"
    - "tests/commands/test_consolidate_root_regression.py"
    - "tests/commands/test_doctor_phase4.py"
    - "tests/commands/test_instruction_artifact_policy.py"
    - "tests/commands/test_log.py"
    - "tests/commands/test_maintain.py"
    - "tests/mcp/test_activation.py"
    - "tests/mcp/test_context_map.py"
    - "tests/mcp/test_write_tools.py"
    - "tests/test_dual_mode.py"
    - "tests/test_immutable_history.py"
  allowed_path_patterns:
    - "docs/reviews/project-ontos-v5-0-3-log-paths/**"
  composition_targets:
    - path: "docs/specs/project-ontos-v5-remediation-release-plan-proposal.md"
      rationale: "Read-only parent authority for the #149 compatibility boundary, shared ResolvedLogPaths contract, release placement, and residual-issue custody."
      shares_with_deliverable_id: "project-ontos-v5-remediation-release-plan"
  forbidden_paths:
    - ".github/"
    - ".llm-dev/framework/"
    - ".ontos-internal/archive/"
    - ".project-internal/"
    - "build/"
    - "dist/"
    - "docs/logs/"
    - "ontos/core/body_refs.py"
    - "ontos/core/config.py"
    - "ontos/core/graph.py"
    - "ontos/core/ontology.py"
    - "ontos/io/config.py"
    - "ontos/mcp/schemas.py"
    - "pyproject.toml"
  forbidden_symbols: []
  forbidden_symbol_exemptions: []
  cardinality_assertions:
    - name: "The proposal preserves exactly seven parent-authorized #149 compatibility wrappers"
      command: 'grep -cE "^\| W[1-7] \|" docs/specs/project-ontos-v5-0-3-log-paths-proposal.md'
      expect: "eq:7"
  cleanliness:
    pathspecs: []
    exclude_pathspecs:
      - "docs/reviews/project-ontos-v5-0-3-log-paths/.external/"

artifacts:
  spec: "docs/specs/project-ontos-v5-0-3-log-paths-spec.md"
  family_verdict: "docs/reviews/project-ontos-v5-0-3-log-paths/<phase>-<family>-<role>.md"
  canonical_verdict: "docs/reviews/project-ontos-v5-0-3-log-paths/<phase>-verdict.md"
  product_verdict: "docs/reviews/project-ontos-v5-0-3-log-paths/<phase>-<family>-product.md"
  proposal_verdict: "docs/reviews/project-ontos-v5-0-3-log-paths/pre-a-proposal-verdict.md"
  fix_summary: "docs/reviews/project-ontos-v5-0-3-log-paths/D.4-fix-summary.md"
  verification: "docs/reviews/project-ontos-v5-0-3-log-paths/D.5-<family>-verifier.md"
  final_approval: "docs/reviews/project-ontos-v5-0-3-log-paths/final-approval.md"
  retro: "docs/retros/project-ontos-v5-0-3-log-paths-retro.md"

model_assignments:
  - phase: "-A.proposal"
    assignments: {glm: proposal-reviewer}
  - phase: "A"
    assignments: {codex: spec-author}
  - phase: "B.1"
    assignments: {claude: adversarial, gemini: alignment, glm: peer}
  - phase: "B.1"
    assignments: {claude: product}
  - phase: "B.2"
    assignments: {claude: alignment, gemini: peer, glm: adversarial}
  - phase: "B.2"
    assignments: {claude: product}
  - phase: "B.3"
    assignments: {codex: meta-consolidator}
  - phase: "C"
    assignments: {codex: implementation-author}
  - phase: "D.1"
    assignments: {claude: peer}
  - phase: "D.2"
    assignments: {claude: peer, gemini: adversarial, glm: alignment}
  - phase: "D.2"
    assignments: {claude: product}
  - phase: "D.3"
    assignments: {codex: meta-consolidator}
  - phase: "D.4"
    assignments: {codex: fix-author}
  - phase: "D.5"
    assignments: {claude: verifier, gemini: verifier, glm: verifier}
  - phase: "D.6"
    assignments: {codex: final-approval}
  - phase: "E"
    assignments: {codex: retro}

cli_capability_matrix:
  codex: {shell: true, git: true, test_runner: true, doc_index: true}
  claude: {shell: true, git: true, test_runner: true, doc_index: true}
  gemini:
    shell: false
    git: false
    test_runner: false
    doc_index: true
    evidence_cap: static-inspection
    writes_files_non_interactively: false
  glm: {shell: true, git: true, test_runner: true, doc_index: true}

smoke_checks:
  - phase: "-A.proposal"
    checks:
      - name: "Proposal frontmatter resolves"
        command: 'PYTHONPATH=. "${ONTOS_PYTHON}" -m ontos link-check --frontmatter-only --json'
        expect: "exit-0"
      - name: "Manifest conforms to the adopter framework"
        command: "scripts/llm-dev verify manifests/project-ontos-v5-0-3-log-paths.yaml"
        expect: "exit-0"
      - name: "Proposal preserves exactly seven compatibility wrappers"
        command: 'grep -cE "^\| W[1-7] \|" docs/specs/project-ontos-v5-0-3-log-paths-proposal.md'
        expect: "eq:7"

regression_guards: []
sibling_deliverable_ids: []
review_rounds: []
reviewer_family_substitutes: []
consolidation_mode: fast-path
implementation_sequencing:
  mode: spec-first
self_review_caveats:
  - family: codex
    phases: ["D.3"]
    rationale: "Codex may implement only after approval and then consolidate independent review evidence; D.2 and D.5 remain assigned to non-author families."

lifecycle_receipt_inventory_path: "docs/reviews/project-ontos-v5-0-3-log-paths/lifecycle-receipt-inventory.yaml"
required_dispatch_bundles:
  - phase: "B.1"
    intent_path: "docs/reviews/project-ontos-v5-0-3-log-paths/B.1-dispatch-intent.yaml"
    result_path: "docs/reviews/project-ontos-v5-0-3-log-paths/B.1-dispatch-result.yaml"
  - phase: "B.2"
    intent_path: "docs/reviews/project-ontos-v5-0-3-log-paths/B.2-dispatch-intent.yaml"
    result_path: "docs/reviews/project-ontos-v5-0-3-log-paths/B.2-dispatch-result.yaml"
  - phase: "D.2"
    intent_path: "docs/reviews/project-ontos-v5-0-3-log-paths/D.2-dispatch-intent.yaml"
    result_path: "docs/reviews/project-ontos-v5-0-3-log-paths/D.2-dispatch-result.yaml"
  - phase: "D.5"
    intent_path: "docs/reviews/project-ontos-v5-0-3-log-paths/D.5-dispatch-intent.yaml"
    result_path: "docs/reviews/project-ontos-v5-0-3-log-paths/D.5-dispatch-result.yaml"

merge_authority:
  mode: recommendation_only

cross_repo_dependencies: []
historical_receipt_gaps: []
gate_only_invariants: []
convergence_metrics: []

gate_env:
  - name: ONTOS_PYTHON
    description: "Python interpreter with Project Ontos development dependencies."
    example: "ONTOS_PYTHON=.venv/bin/python"
    required: true
    scope: both
  - name: CHILD_BASE_SHA
    description: "Full immutable commit SHA captured when the dedicated child worktree is created after Pre-A approval and persisted in its handoff or receipt."
    example: "CHILD_BASE_SHA=<40-hex-commit-sha>"
    required: true
    scope: gate

gate_prerequisites:
  - id: G-test-1
    category: test
    description: "Future implementation gate: the shared resolver, seven compatibility wrappers, and writer/reader/consolidator parity suites pass."
    verification:
      command: 'PYTHONPATH=. "${ONTOS_PYTHON}" -m pytest -q tests/core/test_resolved_log_paths.py tests/core/test_paths_v2_deprecation.py tests/commands/test_log.py tests/commands/test_consolidate_parity.py tests/commands/test_consolidate_root_regression.py tests/mcp/test_write_tools.py'
      expect: "exit-0"
  - id: G-scope-1
    category: scope
    description: "Future implementation gate: all changes remain inside this child manifest from its recorded immutable base."
    verification:
      command: 'test -n "${CHILD_BASE_SHA:-}" && test "$(git rev-parse --verify "${CHILD_BASE_SHA}^{commit}" 2>/dev/null)" = "${CHILD_BASE_SHA}" && bash .llm-dev/framework/scripts/verify-changed-path-scope.sh --manifest manifests/project-ontos-v5-0-3-log-paths.yaml --base "${CHILD_BASE_SHA}"'
      expect: "exit-0"
  - id: G-cardinality-1
    category: cardinality
    description: "The child proposal preserves exactly seven independently reviewable #149 compatibility wrappers."
    verification:
      command: 'grep -cE "^\| W[1-7] \|" docs/specs/project-ontos-v5-0-3-log-paths-proposal.md'
      expect: "eq:7"
  - id: G-verdict-1
    category: verdict-presence
    description: "A non-author GLM Template 16 proposal verdict exists."
    verification:
      command: "test -f docs/reviews/project-ontos-v5-0-3-log-paths/pre-a-proposal-verdict.md"
      expect: "exit-0"
  - id: G-blocker-1
    category: blocker-closure
    description: "The child may enter Phase A only on the exact requested Template 16 disposition."
    verification:
      command: 'grep -Eq "^- \*\*Overall verdict:\*\* Proceed to Phase A$" docs/reviews/project-ontos-v5-0-3-log-paths/pre-a-proposal-verdict.md'
      expect: "exit-0"
  - id: G-branch-1
    category: branch
    description: "Future implementation gate: work runs on the dedicated child branch descended from its recorded base."
    verification:
      command: 'test -n "${CHILD_BASE_SHA:-}" && test "$(git branch --show-current)" = "codex/project-ontos-v5-0-3-log-paths" && test "$(git rev-parse --verify "${CHILD_BASE_SHA}^{commit}" 2>/dev/null)" = "${CHILD_BASE_SHA}" && test "$(git merge-base "${CHILD_BASE_SHA}" HEAD)" = "${CHILD_BASE_SHA}"'
      expect: "exit-0"

tracker:
  path: "docs/trackers/project-ontos-v5-0-3-log-paths.md"
  columns: [phase, owner, status, artifact, evidence, timestamp]

branch_map:
  default: "codex/project-ontos-v5-0-3-log-paths"

references:
  - path: "docs/specs/project-ontos-v5-remediation-release-plan-proposal.md"
    relevance: "Parent authority for the log-path contract, #149 compatibility scope, exclusions, gates, and release custody."
  - path: "docs/reviews/2026-07-10-codex-audit-revalidation.md"
    relevance: "Current-main reproduction and audited issue baseline."
  - path: "docs/reference/Ontos_Manual.md"
    relevance: "Current logging, consolidation, maintenance, activation, doctor, and MCP behavior."
  - path: "docs/reference/Ontos_Agent_Instructions.md"
    relevance: "Current generated instruction contract and session-end behavior."
  - path: "docs/reference/ontology_spec.md"
    relevance: "Current document and archive conventions."

watch_item: "This child may introduce only the shared ResolvedLogPaths authority, active-log query behavior, and delegation by exactly seven #149 compatibility wrappers. The configured active stream remains the read/write/consolidation input; contributor history and archive authority remain internal. No stream may be moved, merged, reactivated, migrated, or deleted, and no docs shadow authority may be created. The seven public signatures, string path return types, warnings, and import/re-export locations remain compatible throughout v5. The residual log-alignment issue number remains pending board-hygiene creation, and #149 stays open until v6 removal verification. This public CLI/MCP child remains user_facing, requires Product review, and must not enter Phase A without its own non-author Proceed to Phase A verdict."
