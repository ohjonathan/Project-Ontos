manifest_version: "1.9.0"
id: project-ontos-github-issues-115-117
slug: project-ontos-github-issues-115-117
summary: "Address open GitHub issues #115 (MCP get_context_bundle schema-safe pre-activate warning), #116 (document MCP host reload after Ontos upgrade), and #117 (activation depends_on resolution, warning enrichment, type/status widening, body.bare_id_token precision, and doctor severity alignment) in one strict-P3 lifecycle pass."

lifecycle_mode: framework lifecycle
deliverable_type: standard

owners:
  - "Project Ontos Maintainers"

pre_a:
  entry: triage
  artifact_path: "docs/reviews/project-ontos-github-issues-115-117/github-issues-input.md"

scope:
  allowed_paths:
    - ".llm-dev/"
    - "AGENTS.md"
    - "Ontos_Context_Map.md"
    - "README.md"
    - "docs/reference/"
    - "docs/releases/"
    - "docs/retros/"
    - "docs/specs/"
    - "docs/trackers/"
    - "manifests/"
    - "ontos/"
    - "pyproject.toml"
    - "scripts/llm-dev"
    - "tests/"
  allowed_path_patterns:
    - "docs/reviews/project-ontos-github-issues-115-117/*"
  composition_targets: []
  forbidden_paths:
    - ".github/"
    - "dist/"
    - "build/"
    - "site/"
    - "docs/logs/"
  forbidden_symbols:
    - "git reset --hard"
    - "git checkout -- ."
  cardinality_assertions:
    - name: "get_context_bundle declares warnings field"
      command: "python -c \"from ontos.mcp.schemas import GetContextBundleResponse as M; assert 'warnings' in M.model_fields, 'warnings field missing'; print('ok')\""
      expect: "literal:ok"
    - name: "all three issues mentioned in spec"
      command: "grep -cE '#11[567]' docs/specs/project-ontos-github-issues-115-117-spec.md"
      expect: "gte:3"

artifacts:
  spec:              "docs/specs/project-ontos-github-issues-115-117-spec.md"
  family_verdict:    "docs/reviews/project-ontos-github-issues-115-117/<phase>-<family>-<role>.md"
  canonical_verdict: "docs/reviews/project-ontos-github-issues-115-117/<phase>-verdict.md"
  fix_summary:       "docs/reviews/project-ontos-github-issues-115-117/D.4-fix-summary.md"
  verification:      "docs/reviews/project-ontos-github-issues-115-117/D.5-<family>-verifier.md"
  final_approval:    "docs/reviews/project-ontos-github-issues-115-117/final-approval.md"
  retro:             "docs/retros/project-ontos-github-issues-115-117-retro.md"
  triage_report:     "docs/reviews/project-ontos-github-issues-115-117/pre-a-triage-report.md"

model_assignments:
  - phase: "-A.triage"
    assignments:
      codex: triage-author
  - phase: "A"
    assignments:
      codex: spec-author
  - phase: "B.1"
    assignments:
      claude-opus:   peer
      claude-sonnet: alignment
      gemini:        adversarial
  - phase: "B.3"
    assignments:
      claude-opus: meta-consolidator
  - phase: "C"
    assignments:
      codex: implementation-author
  - phase: "D.1"
    assignments:
      claude-sonnet: peer
  - phase: "D.2"
    assignments:
      claude-opus:   peer
      claude-sonnet: alignment
      gemini:        adversarial
  - phase: "D.3"
    assignments:
      claude-opus: meta-consolidator
  - phase: "D.4"
    assignments:
      codex: fix-author
  - phase: "D.5"
    assignments:
      claude-opus:   verifier
      claude-sonnet: verifier
      gemini:        verifier
  - phase: "D.6"
    assignments:
      claude-sonnet: final-approval
  - phase: "E"
    assignments:
      gemini: retro

cli_capability_matrix:
  codex:
    shell: true
    git: true
    test_runner: true
    doc_index: true
  claude-opus:
    shell: true
    git: true
    test_runner: true
    doc_index: true
  claude-sonnet:
    shell: true
    git: true
    test_runner: true
    doc_index: true
  gemini:
    shell: false
    git: false
    test_runner: false
    doc_index: true
    evidence_cap: static-inspection
    writes_files_non_interactively: false

smoke_checks:
  - phase: "C"
    checks:
      - name: "targeted Ontos suites for #115 / #117 surface"
        command: ".venv/bin/python -m pytest -q tests/mcp/test_bundler.py tests/mcp/test_activation.py tests/mcp/test_schemas.py tests/core/test_graph.py tests/core/test_validation.py tests/core/test_frontmatter_repair.py tests/commands/test_link_check.py tests/commands/test_doctor_phase4.py"
        expect: "exit-0"
  - phase: "D.5"
    checks:
      - name: "MCP contract tests"
        command: ".venv/bin/python -m pytest -q tests/mcp/test_server_integration.py tests/mcp/test_read_only_registration.py tests/mcp/test_schemas.py tests/mcp/test_write_tools.py"
        expect: "exit-0"
  - phase: "D.6"
    checks:
      - name: "full test suite"
        command: ".venv/bin/python -m pytest -q"
        expect: "exit-0"

regression_guards: []

sibling_deliverable_ids: []
self_review_caveats: []
consolidation_mode: external
reviewer_family_substitutes: []

merge_authority:
  mode: recommendation_only

cross_repo_dependencies: []
historical_receipt_gaps: []
gate_only_invariants: []
convergence_metrics: []

gate_prerequisites:
  - id: G-test-1
    category: test
    description: "Targeted Ontos suites for #115/#117 surface area pass."
    verification:
      command: ".venv/bin/python -m pytest -q tests/mcp/test_bundler.py tests/mcp/test_activation.py tests/mcp/test_schemas.py tests/core/test_graph.py tests/core/test_validation.py tests/core/test_frontmatter_repair.py tests/commands/test_link_check.py tests/commands/test_doctor_phase4.py"
      expect: "exit-0"
  - id: G-test-2
    category: test
    description: "Full Ontos test suite passes at D.6."
    verification:
      command: ".venv/bin/python -m pytest -q"
      expect: "exit-0"
  - id: G-scope-1
    category: scope
    description: "No changes outside scope-lock allowed paths."
    verification:
      command: "git diff --name-only main..HEAD | grep -vE '^(\\.llm-dev/|\\.gitmodules|AGENTS\\.md|Ontos_Context_Map\\.md|README\\.md|docs/reference/|docs/releases/|docs/retros/|docs/specs/|docs/trackers/|docs/reviews/project-ontos-github-issues-115-117/|manifests/|ontos/|pyproject\\.toml|scripts/llm-dev|tests/|\\.johnny-os\\.yaml|\\.ontos-internal/)'"
      expect: "exit-nonzero"
  - id: G-cardinality-1
    category: cardinality
    description: "get_context_bundle response model declares a 'warnings' field (the schema-safe channel for the pre-activate warning, per #115)."
    verification:
      command: "python -c \"from ontos.mcp.schemas import GetContextBundleResponse as M; assert 'warnings' in M.model_fields, 'warnings field missing'; print('ok')\""
      expect: "literal:ok"
  - id: G-cardinality-2
    category: cardinality
    description: "All three target issues (#115, #116, #117) are explicitly mentioned in the spec."
    verification:
      command: "grep -cE '#11[567]' docs/specs/project-ontos-github-issues-115-117-spec.md"
      expect: "gte:3"
  - id: G-verdict-1
    category: verdict-presence
    description: "Canonical Phase B.3 verdict exists."
    verification:
      command: "test -f docs/reviews/project-ontos-github-issues-115-117/B.3-verdict.md"
      expect: "exit-0"
  - id: G-verdict-2
    category: verdict-presence
    description: "Canonical Phase D.3 verdict exists."
    verification:
      command: "test -f docs/reviews/project-ontos-github-issues-115-117/D.3-verdict.md"
      expect: "exit-0"
  - id: G-verdict-3
    category: verdict-presence
    description: "D.5 verifier artifacts from all three non-author families exist."
    verification:
      command: "ls docs/reviews/project-ontos-github-issues-115-117/D.5-*-verifier.md 2>/dev/null | wc -l"
      expect: "eq:3"
  - id: G-blocker-1
    category: blocker-closure
    description: "D.4 fix summary exists before final approval."
    verification:
      command: "test -f docs/reviews/project-ontos-github-issues-115-117/D.4-fix-summary.md"
      expect: "exit-0"
  - id: G-blocker-2
    category: blocker-closure
    description: "No unresolved blocker lines in any canonical verdict."
    verification:
      command: "awk '/^## Preserved blockers/,/^## /' docs/reviews/project-ontos-github-issues-115-117/*-verdict.md | grep -E '^- \\*\\*ID:\\*\\*'"
      expect: "exit-nonzero"
  - id: G-branch-1
    category: branch
    description: "Work runs on the deliverable branch."
    verification:
      command: "git branch --show-current"
      expect: "literal:codex/project-ontos-github-issues-115-117"

review_rounds: []

tracker:
  path: "docs/trackers/project-ontos-github-issues-115-117.md"
  columns: [phase, owner, status, artifact, evidence, timestamp]

branch_map:
  default: "codex/project-ontos-github-issues-115-117-<PHASE_ID>-<ROLE>-<FAMILY>"

references:
  - path: ".llm-dev/framework/framework.md"
    version: "1.9.0"
    relevance: "Lifecycle authority from Pre-A through Phase E."
  - path: ".llm-dev/framework/playbook.md"
    version: "1.9.0"
    relevance: "Pre-A triage entry, dispatch rules, P3 cardinality."
  - path: "docs/reference/Ontos_Agent_Instructions.md"
    relevance: "Agent activation contract."
  - path: "docs/reference/Ontos_Manual.md"
    relevance: "CLI and MCP user documentation."
  - path: "/Users/jonathanoh/ontos-issue-tree/company-os-ontos-rca-2026-05-22/"
    relevance: "Read-only external reproduction evidence for #117 (analysis, evidence, mcp, preflight, repro)."
