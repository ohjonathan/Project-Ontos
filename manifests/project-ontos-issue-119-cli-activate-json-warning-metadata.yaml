        command: ".venv/bin/python -m pytest -q tests/mcp/test_activation.py tests/mcp/test_schemas.py tests/mcp/test_server_integration.py tests/mcp/test_write_tools.py"
        expect: "exit-0"
  - phase: "D.6"
    checks:
