manifest_version: "1.9.0"
id: project-ontos-issue-119-cli-activate-json-warning-metadata
slug: project-ontos-issue-119-cli-activate-json-warning-metadata
summary: "Close the remaining D.6 deferral from PR #118 (closing #115/#116/#117): enrich `ontos activate --json` validation warnings/errors with structured metadata (severity, rule_id, message, document_id, file_path) so CLI automation reaches MCP parity. Closes issue #119."

lifecycle_mode: framework lifecycle
deliverable_type: standard

owners:
  - "Project Ontos Maintainers"

pre_a:
  entry: triage
  artifact_path: "docs/reviews/project-ontos-issue-119-cli-activate-json-warning-metadata/github-issues-input.md"

scope:
  allowed_paths:
    - ".llm-dev/"
    - "AGENTS.md"
    - "Ontos_Context_Map.md"
    - "README.md"
    - "docs/reference/"
    - "docs/releases/"
    - "docs/retros/"
    - "docs/specs/"
    - "docs/trackers/"
    - "manifests/"
    - "ontos/"
    - "pyproject.toml"
    - "scripts/llm-dev"
    - "tests/"
  allowed_path_patterns:
    - "docs/reviews/project-ontos-issue-119-cli-activate-json-warning-metadata/*"
  composition_targets: []
  forbidden_paths:
    - ".github/"
    - "dist/"
    - "build/"
    - "site/"
    - "docs/logs/"
    - ".llm-dev/framework/"
  forbidden_symbols:
    - "git reset --hard"
    - "git checkout -- ."
  cardinality_assertions:
    - name: "ValidationError exposes a to_dict() method (shared serialization for CLI + MCP)"
      command: ".venv/bin/python -c \"from ontos.core.types import ValidationError; assert callable(getattr(ValidationError, 'to_dict', None)), 'to_dict missing'; print('ok')\""
      expect: "literal:ok"
    - name: "Issue #119 mentioned in the spec"
      command: "grep -c '#119' docs/specs/project-ontos-issue-119-cli-activate-json-warning-metadata-spec.md"
      expect: "gte:1"

artifacts:
  spec:              "docs/specs/project-ontos-issue-119-cli-activate-json-warning-metadata-spec.md"
  family_verdict:    "docs/reviews/project-ontos-issue-119-cli-activate-json-warning-metadata/<phase>-<family>-<role>.md"
  canonical_verdict: "docs/reviews/project-ontos-issue-119-cli-activate-json-warning-metadata/<phase>-verdict.md"
