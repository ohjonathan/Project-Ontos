  verification:      "docs/reviews/project-ontos-issue-119-cli-activate-json-warning-metadata/D.5-<family>-verifier.md"
  final_approval:    "docs/reviews/project-ontos-issue-119-cli-activate-json-warning-metadata/final-approval.md"
  retro:             "docs/retros/project-ontos-issue-119-cli-activate-json-warning-metadata-retro.md"
