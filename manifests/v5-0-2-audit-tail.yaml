manifest_version: "2.0.1"
id: v5-0-2-audit-tail
slug: v5-0-2-audit-tail
summary: "Ship v5.0.2 with bounded TestPyPI propagation polling, recursive in-process CLI help coverage, and the finalized v5.0.1 O4 ledger."

lifecycle_mode: framework lifecycle
deliverable_type: standard
user_facing: false
fallback_evidence_mode: strict_p3
require_lifecycle_dispatch_bundles: true
strict_p3_required_phases: ["B.1", "D.2", "D.5"]

owners: ["Project Ontos Maintainers"]
authorship:
  deliverable_author_families: [codex]
  structural_orchestrator_families: [codex]

implementation_sequencing:
  mode: code-first-user-gated
  user_gate_ref: "Maintainer dispatch for the v5.0.2 propagation-race and test-hygiene patch."
  implementation_ref: "codex/v5.0.2-audit-tail from origin/main@8976fa1bebf1ba9ca4895239ff758429d623efc5"
  rationale: "The maintainer supplied the exact retry boundary, the two inherited test-hygiene rows, and the release-ledger truth."

scope:
  allowed_paths:
    - ".github/workflows/publish.yml"
    - "CHANGELOG.md"
    - "Ontos_Context_Map.md"
    - "docs/releases/v5.0.2.md"
    - "docs/specs/v5-0-2-audit-tail-spec.md"
    - "docs/trackers/project-ontos-audit-remediation-release-line.md"
    - "docs/trackers/v5-0-2-audit-tail.md"
    - "manifests/v5-0-2-audit-tail.yaml"
    - "ontos/__init__.py"
    - "pyproject.toml"
    - "scripts/release_artifacts.py"
    - "tests/commands/test_consolidate_parity.py"
    - "tests/commands/test_export_data_parity.py"
    - "tests/commands/test_maintain.py"
    - "tests/commands/test_map.py"
    - "tests/commands/test_migrate_parity.py"
    - "tests/commands/test_migration_report_parity.py"
    - "tests/commands/test_promote_parity.py"
    - "tests/commands/test_query_parity.py"
    - "tests/commands/test_scaffold_parity.py"
    - "tests/commands/test_scan_scope_integration.py"
    - "tests/commands/test_stub_parity.py"
    - "tests/commands/test_verify_parity.py"
    - "tests/golden/baselines/medium/context_map.md"
    - "tests/golden/baselines/medium/log_metadata.json"
    - "tests/golden/baselines/medium/map_metadata.json"
    - "tests/golden/baselines/small/context_map.md"
    - "tests/golden/baselines/small/log_metadata.json"
    - "tests/golden/baselines/small/map_metadata.json"
    - "tests/test_cli.py"
    - "tests/test_cli_help.py"
    - "tests/test_cli_phase4.py"
    - "tests/test_release_artifacts.py"
    - "tests/test_version.py"
  allowed_path_patterns:
    - "docs/logs/*v5-0-2-audit-tail*.md"
    - "docs/reviews/v5-0-2-audit-tail/**"
    - "docs/retros/v5-0-2-audit-tail*.md"
  composition_targets:
    - path: "docs/reviews/2026-07-02-fable-repo-audit.md"
      rationale: "Read-only evidence for D6a-test-gaps-10 and D6b-test-quality-4."
      shares_with_deliverable_id: "project-ontos-audit-remediation-2026-07"
    - path: "docs/releases/v5.0.1.md"
      rationale: "Read-only provenance context for the first real R2 gate run."
      shares_with_deliverable_id: "project-ontos-audit-tail-config-provenance"
  forbidden_paths:
    - ".ontos-internal/archive/"
    - ".project-internal/"
    - ".llm-dev/framework/"
    - ".venv/"
    - "build/"
    - "dist/"
    - "ontos/core/paths.py"
  forbidden_symbols: []
  cardinality_assertions:
    - name: "Package metadata agrees on v5.0.2"
      command: "${ONTOS_PYTHON} -c 'import ontos, pathlib, tomllib; data=tomllib.loads(pathlib.Path(\"pyproject.toml\").read_text()); assert ontos.__version__ == data[\"project\"][\"version\"] == \"5.0.2\"'"
      expect: "exit-0"
    - name: "Only three process-boundary help checks remain"
      command: "test \"$(rg -l --glob 'test_*.py' -- '\"--help\"|\\x27--help\\x27' tests | wc -l | tr -d ' ')\" = 3"
      expect: "exit-0"
    - name: "Legacy marker is absent"
      command: "! rg -n 'legacy: tests for pre-v3.0' pyproject.toml"
      expect: "exit-0"
  cleanliness:
    pathspecs: []
    exclude_pathspecs: ["review-board/.external/"]

artifacts:
  spec: "docs/specs/v5-0-2-audit-tail-spec.md"
  family_verdict: "docs/reviews/v5-0-2-audit-tail/<phase>-<family>-<role>.md"
  canonical_verdict: "docs/reviews/v5-0-2-audit-tail/<phase>-verdict.md"
  product_verdict: "docs/reviews/v5-0-2-audit-tail/<phase>-<family>-product.md"
  fix_summary: "docs/reviews/v5-0-2-audit-tail/D.4-fix-summary.md"
  verification: "docs/reviews/v5-0-2-audit-tail/D.5-<family>-verifier.md"
  final_approval: "docs/reviews/v5-0-2-audit-tail/final-approval.md"
  retro: "docs/retros/v5-0-2-audit-tail-retro.md"

model_assignments:
  - phase: "A"
    assignments: {codex: spec-author}
  - phase: "B.1"
    assignments: {claude: adversarial, gemini: alignment, glm: peer}
  - phase: "B.1"
    assignments: {claude: product}
  - phase: "B.2"
    assignments: {claude: alignment, gemini: peer, glm: adversarial}
  - phase: "B.2"
    assignments: {claude: product}
  - phase: "B.3"
    assignments: {codex: meta-consolidator}
  - phase: "C"
    assignments: {codex: implementation-author}
  - phase: "D.1"
    assignments: {claude: peer}
  - phase: "D.2"
    assignments: {claude: peer, gemini: adversarial, glm: alignment}
  - phase: "D.2"
    assignments: {claude: product}
  - phase: "D.3"
    assignments: {codex: meta-consolidator}
  - phase: "D.4"
    assignments: {codex: fix-author}
  - phase: "D.5"
    assignments: {claude: verifier, gemini: verifier, glm: verifier}
  - phase: "D.6"
    assignments: {codex: final-approval}
  - phase: "E"
    assignments: {codex: retro}

cli_capability_matrix:
  codex: {shell: true, git: true, test_runner: true, doc_index: true}
  claude: {shell: true, git: true, test_runner: true, doc_index: true}
  gemini:
    shell: false
    git: false
    test_runner: false
    doc_index: true
    evidence_cap: static-inspection
    writes_files_non_interactively: false
  glm: {shell: true, git: true, test_runner: true, doc_index: true}

smoke_checks:
  - phase: "C"
    checks:
      - name: "PR D focused regressions"
        command: "PYTHONPATH=. ${ONTOS_PYTHON} -m pytest -q tests/commands/test_consolidate_root_regression.py tests/commands/test_maintain.py tests/commands/test_verify_portfolio.py tests/mcp/test_context_bundle_config.py tests/mcp/test_portfolio_config.py tests/mcp/test_read_only_registration.py tests/test_cli_contract_v4.py tests/test_release_artifacts.py tests/test_version.py tests/commands/test_doctor_phase4.py::TestDoctorCommand::test_returns_exit_code_0_when_checks_pass_or_only_warn"
        expect: "exit-0"
      - name: "Complete Ontos suite"
        command: "PYTHONPATH=. ${ONTOS_PYTHON} -m pytest -q"
        expect: "exit-0"
      - name: "Release artifact verifier compiles"
        command: "${ONTOS_PYTHON} -m compileall -q scripts/release_artifacts.py"
        expect: "exit-0"
      - name: "Document graph is valid"
        command: "${ONTOS_PYTHON} -m ontos link-check --no-orphans --quiet"
        expect: "exit-0"
  - phase: "D.5"
    checks:
      - name: "Post-review complete suite"
        command: "PYTHONPATH=. ${ONTOS_PYTHON} -m pytest -q"
        expect: "exit-0"

regression_guards: []
sibling_deliverable_ids: []
review_rounds: []
reviewer_family_substitutes: []
consolidation_mode: fast-path
self_review_caveats:
  - family: codex
    phases: ["D.3"]
    rationale: "Codex implements the maintainer-approved slice and only consolidates independent review evidence; D.5 remains non-author."

lifecycle_receipt_inventory_path: "docs/reviews/v5-0-2-audit-tail/lifecycle-receipt-inventory.yaml"
required_dispatch_bundles:
  - phase: "B.1"
    intent_path: "docs/reviews/v5-0-2-audit-tail/B.1-dispatch-intent.yaml"
    result_path: "docs/reviews/v5-0-2-audit-tail/B.1-dispatch-result.yaml"
  - phase: "B.2"
    intent_path: "docs/reviews/v5-0-2-audit-tail/B.2-dispatch-intent.yaml"
    result_path: "docs/reviews/v5-0-2-audit-tail/B.2-dispatch-result.yaml"
  - phase: "D.2"
    intent_path: "docs/reviews/v5-0-2-audit-tail/D.2-dispatch-intent.yaml"
    result_path: "docs/reviews/v5-0-2-audit-tail/D.2-dispatch-result.yaml"
  - phase: "D.5"
    intent_path: "docs/reviews/v5-0-2-audit-tail/D.5-dispatch-intent.yaml"
    result_path: "docs/reviews/v5-0-2-audit-tail/D.5-dispatch-result.yaml"

merge_authority:
  mode: recommendation_only

cross_repo_dependencies: []
historical_receipt_gaps: []
gate_only_invariants: []
convergence_metrics: []

gate_env:
  - name: ONTOS_PYTHON
    description: "Python interpreter with repository development dependencies installed."
    example: "ONTOS_PYTHON=/path/to/project/.venv/bin/python"
    required: true
    scope: both

gate_prerequisites:
  - id: G-test-1
    category: test
    description: "The focused v5.0.2 regression suite passes."
    verification: {command: "PYTHONPATH=. ${ONTOS_PYTHON} -m pytest -q tests/test_release_artifacts.py tests/test_cli_help.py tests/test_cli.py tests/test_cli_phase4.py tests/test_version.py", expect: "exit-0"}
  - id: G-security-1
    category: test
    description: "Only exact-version-not-found is retried; hash mismatch fails immediately."
    verification: {command: "${ONTOS_PYTHON} -m pytest -q tests/test_release_artifacts.py -k 'download or workflow'", expect: "exit-0"}
  - id: G-scope-1
    category: scope
    description: "The breaking v6 path surface is untouched."
    verification: {command: "git diff --name-only origin/main -- ontos/core/paths.py ontos/core/__init__.py", expect: "empty"}
  - id: G-cardinality-1
    category: cardinality
    description: "Exactly three intentional process-boundary help tests remain."
    verification: {command: "test \"$(rg -l --glob 'test_*.py' -- '\"--help\"|\\x27--help\\x27' tests | wc -l | tr -d ' ')\" = 3", expect: "exit-0"}
  - id: G-verdict-1
    category: verdict-presence
    description: "Canonical B.3/D.3 verdicts and three D.5 verifier artifacts exist."
    verification: {command: "test -f docs/reviews/v5-0-2-audit-tail/B.3-verdict.md && test -f docs/reviews/v5-0-2-audit-tail/D.3-verdict.md && test \"$(find docs/reviews/v5-0-2-audit-tail -name 'D.5-*-verifier.md' | wc -l | tr -d ' ')\" = 3", expect: "exit-0"}
  - id: G-blocker-1
    category: blocker-closure
    description: "No preserved blocker remains in the canonical D.3 verdict."
    verification: {command: "test -f docs/reviews/v5-0-2-audit-tail/D.3-verdict.md && ! grep -q 'status: preserved' docs/reviews/v5-0-2-audit-tail/D.3-verdict.md", expect: "exit-0"}
  - id: G-branch-1
    category: branch
    description: "The branch remains based on the recorded origin/main baseline."
    verification: {command: "test \"$(git merge-base 8976fa1bebf1ba9ca4895239ff758429d623efc5 HEAD)\" = \"8976fa1bebf1ba9ca4895239ff758429d623efc5\"", expect: "exit-0"}

tracker:
  path: "docs/trackers/v5-0-2-audit-tail.md"
  columns: [phase, owner, status, artifact, evidence, timestamp]

branch_map:
  default: "codex/v5.0.2-audit-tail"

references:
  - path: "docs/reviews/2026-07-02-fable-repo-audit.md"
    relevance: "Original evidence for D6a-test-gaps-10 and D6b-test-quality-4."
  - path: "docs/trackers/project-ontos-audit-remediation-release-line.md"
    relevance: "Authoritative sequential release split and reconciliation arithmetic."

watch_item: "This PR may implement the v5.0.2 propagation retry, two inherited #148 test-hygiene rows, version/docs, and ledger truth. Tagging, publication, #148 closure, and v6 path removal remain maintainer-owned."
