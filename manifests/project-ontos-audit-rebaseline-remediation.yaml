id: project-ontos-audit-rebaseline-remediation
slug: project-ontos-audit-rebaseline-remediation
summary: "Review and certify the frozen audit-rebaseline integration snapshot without claiming per-issue lifecycle closure or release readiness."

lifecycle_mode: framework lifecycle
deliverable_type: closeout-proof
user_facing: true
fallback_evidence_mode: provider_limited_fallback
require_lifecycle_dispatch_bundles: true
strict_p3_required_phases: ["B.1", "D.2", "D.5"]

harness_blocked_families:
  - family: gemini
    provider: google
    affected_phases: ["D.5"]
    affected_role: verifier
    blockage_category: provider_policy
    blockage_evidence_path: "docs/reviews/project-ontos-audit-rebaseline-remediation/.raw/audit-rb-D5-current-gv.r2.c20260711T181904Z.15040.4f6b3ae8e1bd84cf814c460a5ca9950d.stderr.txt"
    blockage_evidence_sha256: a679000b7c760893a6990750b02ccb92d4fffc5adbce5330a46127921813e656
    first_observed: "2026-07-11T18:19:05Z"
    retry_policy: "One genuine direct-Gemini retry was performed after the maintainer reported quota reset; the provider rejected the retired individual client with exit 55. No blind retry loop or cross-family relabeling is authorized."
    fallback_route: "Warning-only current-head Claude and GLM verifier evidence; no substitute is represented as Gemini."
    re_adjudication_owner: "Project Ontos Maintainers"
    re_adjudication_ref: ra-pr161-d5-gemini-verifier

provider_limited_review_exception:
  scope: "PR #161 current-head D.5 Gemini verifier seat and the pinned v2.0.1 receipt-verifier defects only."
  strict_p3_roles_unsatisfied: [verifier]
  fallback_roles_used: [verifier]
  evidence_type: framework_fallback_evidence
  strict_p3_certified: false
  authorization_ref: "Maintainer handoff dated 2026-07-11: use the documented provider-limited fallback after one genuine retry if v2.0.1 still halts."
  caveat_text: "provider_limited_fallback_complete; strict P3 not certified; maintainer release actions deferred"

re_adjudication_queue:
  - id: ra-pr161-d5-gemini-verifier
    artifact_under_judgment: "docs/reviews/project-ontos-audit-rebaseline-remediation/D.5-current-claude.md"
    blocked_family_ref: gemini
    reason: "The current-head functional result is supported by Claude and GLM, but the independent Gemini verifier could not run because the provider rejected the retired individual client; the D.5 conclusion must be rerun under Gemini when access returns."
    rerun_trigger: "A supported Gemini or AGY route with valid entitlement can produce a wrapper-verifiable Template-15 artifact."
    owner: "Project Ontos Maintainers"
    priority: blocking
    expected_rerun_command: "Re-run audit-rb-D5-current-gv through dispatch-family-review.sh with the manifest-declared Gemini route and append a genuine receipt; then rerun family, receipt-schema, lifecycle, and D.6 gates."
    status: pending

implementation_sequencing:
  mode: code-first-user-gated
  user_gate_ref: "decision:codex-task-2026-07-10-user-directive-run-full-lifecycle-through-d5-and-falsification-review"
  implementation_ref: "859ecf778389aaa67f69146d7ae8cd2564445af5"
  rationale: "I0 preserves integrated product-row provenance; I1 closed Phase C falsification; I2 addresses the six canonical D.3 findings; I3 closes the two reproducible loose-falsification regressions without changing child-row provenance."

owners:
  - "Project Ontos Maintainers"

authorship:
