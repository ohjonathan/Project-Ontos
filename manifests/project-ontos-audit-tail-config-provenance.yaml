  - phase: "B.1"
    intent_path: "docs/reviews/project-ontos-audit-tail-config-provenance/B.1-dispatch-intent.yaml"
    result_path: "docs/reviews/project-ontos-audit-tail-config-provenance/B.1-dispatch-result.yaml"
  - phase: "B.2"
    intent_path: "docs/reviews/project-ontos-audit-tail-config-provenance/B.2-dispatch-intent.yaml"
    result_path: "docs/reviews/project-ontos-audit-tail-config-provenance/B.2-dispatch-result.yaml"
  - phase: "D.2"
