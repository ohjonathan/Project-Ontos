    result_path: "docs/reviews/project-ontos-audit-tail-config-provenance/D.2-dispatch-result.yaml"
  - phase: "D.5"
    intent_path: "docs/reviews/project-ontos-audit-tail-config-provenance/D.5-dispatch-intent.yaml"
    result_path: "docs/reviews/project-ontos-audit-tail-config-provenance/D.5-dispatch-result.yaml"

merge_authority:
  mode: recommendation_only

