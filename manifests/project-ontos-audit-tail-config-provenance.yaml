historical_receipt_gaps: []
gate_only_invariants: []
convergence_metrics: []

gate_env:
  - name: ONTOS_PYTHON
    description: "Python interpreter with repository development dependencies installed."
    example: "ONTOS_PYTHON=/path/to/project/.venv/bin/python"
    required: true
    scope: both

gate_prerequisites:
  - id: G-test-1
    category: test
    description: "The focused PR D regression suite passes."
    verification: {command: "PYTHONPATH=. ${ONTOS_PYTHON} -m pytest -q tests/commands/test_consolidate_root_regression.py tests/commands/test_maintain.py tests/commands/test_verify_portfolio.py tests/mcp/test_context_bundle_config.py tests/mcp/test_portfolio_config.py tests/mcp/test_read_only_registration.py tests/test_cli_contract_v4.py tests/test_release_artifacts.py tests/test_version.py tests/commands/test_doctor_phase4.py::TestDoctorCommand::test_returns_exit_code_0_when_checks_pass_or_only_warn", expect: "exit-0"}
  - id: G-security-1
    category: test
    description: "The release verifier binds exact artifact metadata and hashes without a production-index fallback."
    verification: {command: "${ONTOS_PYTHON} -m pytest -q tests/test_release_artifacts.py && ! rg -n '(skip-existing|extra-index-url|https://pypi[.]org/simple)' .github/workflows/publish.yml scripts/release_artifacts.py", expect: "exit-0"}
  - id: G-scope-1
    category: scope
    description: "No path-compatibility, history-generator, promote-scan, or archive surface changed."
    verification: {command: "git diff --name-only origin/main -- ontos/core/paths.py ontos/core/history.py ontos/commands/promote.py .ontos-internal/archive .project-internal", expect: "empty"}
  - id: G-cardinality-1
    category: cardinality
    description: "Exactly one wheel and one sdist are accepted and all three bundle defaults share named sources."
    verification: {command: "${ONTOS_PYTHON} -m pytest -q tests/test_release_artifacts.py tests/mcp/test_context_bundle_config.py", expect: "exit-0"}
  - id: G-verdict-1
    category: verdict-presence
    description: "Canonical B.3/D.3 verdicts and three D.5 verifier artifacts exist."
    verification: {command: "test -f docs/reviews/project-ontos-audit-tail-config-provenance/B.3-verdict.md && test -f docs/reviews/project-ontos-audit-tail-config-provenance/D.3-verdict.md && test \"$(find docs/reviews/project-ontos-audit-tail-config-provenance -name 'D.5-*-verifier.md' | wc -l | tr -d ' ')\" = 3", expect: "exit-0"}
  - id: G-blocker-1
    category: blocker-closure
    description: "No preserved blocker remains in the canonical D.3 verdict."
    verification: {command: "test -f docs/reviews/project-ontos-audit-tail-config-provenance/D.3-verdict.md && ! grep -q 'status: preserved' docs/reviews/project-ontos-audit-tail-config-provenance/D.3-verdict.md", expect: "exit-0"}
  - id: G-branch-1
    category: branch
    description: "The branch remains based on the current origin/main review baseline."
    verification: {command: "test \"$(git merge-base origin/main HEAD)\" = \"$(git rev-parse origin/main)\"", expect: "exit-0"}

tracker:
  path: "docs/trackers/project-ontos-audit-tail-config-provenance.md"
  columns: [phase, owner, status, artifact, evidence, timestamp]

branch_map:
