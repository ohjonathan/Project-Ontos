manifest_version: "2.0.1"
id: project-ontos-audit-tail-config-provenance
slug: project-ontos-audit-tail-config-provenance
summary: "Close the v5.0.1 audit code tail with neutral configuration, config-driven retention, exact release provenance, and decision-history self-heal."

lifecycle_mode: framework lifecycle
deliverable_type: standard
user_facing: true
fallback_evidence_mode: strict_p3
require_lifecycle_dispatch_bundles: true
strict_p3_required_phases: ["B.1", "D.2", "D.5"]

owners: ["Project Ontos Maintainers"]
authorship:
  deliverable_author_families: [codex]
  structural_orchestrator_families: [codex]

implementation_sequencing:
  mode: code-first-user-gated
  user_gate_ref: "Maintainer dispatch for sequential PR D after independently verified merge of PR C #169."
  implementation_ref: "codex/audit-tail-config-provenance from origin/main@82078066aabe90d8b7b1e57696276833bfd67019"
  rationale: "The maintainer supplied the neutral-default, retention-precedence, exact-artifact provenance, and fail-closed self-heal contracts."

scope:
  allowed_paths:
    - ".github/workflows/publish.yml"
    - ".cursorrules"
    - ".ontos/templates/decision_history_template.md"
    - "AGENTS.md"
    - "CHANGELOG.md"
    - "CLAUDE.md"
    - "Ontos_Context_Map.md"
    - "README.md"
    - "docs/reference/Migration_v3_to_v4.md"
    - "docs/reference/Ontos_Agent_Instructions.md"
    - "docs/reference/Ontos_Manual.md"
    - "docs/releases/v5.0.1.md"
    - "docs/specs/project-ontos-audit-tail-config-provenance-spec.md"
    - "docs/trackers/project-ontos-audit-remediation-release-line.md"
    - "docs/trackers/project-ontos-audit-tail-config-provenance.md"
    - "manifests/project-ontos-audit-tail-config-provenance.yaml"
    - "ontos/__init__.py"
    - "ontos/cli.py"
    - "ontos/commands/consolidate.py"
    - "ontos/mcp/bundler.py"
    - "ontos/mcp/portfolio_config.py"
    - "ontos/mcp/server.py"
    - "pyproject.toml"
    - "scripts/release_artifacts.py"
    - "scripts/release-smoke-requirements.txt"
    - "tests/commands/test_consolidate_root_regression.py"
    - "tests/commands/test_maintain.py"
    - "tests/commands/test_verify_portfolio.py"
    - "tests/mcp/test_context_bundle_config.py"
    - "tests/mcp/test_portfolio_config.py"
    - "tests/mcp/test_read_only_registration.py"
    - "tests/test_cli_contract_v4.py"
    - "tests/test_release_artifacts.py"
    - "tests/test_version.py"
  allowed_path_patterns:
    - "docs/logs/*audit-tail-config-provenance*.md"
    - "docs/reviews/project-ontos-audit-tail-config-provenance/**"
    - "docs/retros/project-ontos-audit-tail-config-provenance*.md"
  composition_targets:
    - path: "docs/reviews/2026-07-02-fable-repo-audit.md"
      rationale: "Read-only evidence for D4a-config-1/3/5."
      shares_with_deliverable_id: "project-ontos-audit-remediation-2026-07"
    - path: "docs/trackers/project-ontos-audit-tail-consistency.md"
      rationale: "Read-only evidence for the accepted PR C baseline and clean-path tripwire."
      shares_with_deliverable_id: "project-ontos-audit-tail-consistency"
  forbidden_paths:
    - ".ontos-internal/archive/"
    - ".project-internal/"
    - ".llm-dev/framework/"
    - ".venv/"
    - "build/"
    - "dist/"
    - "ontos/commands/promote.py"
    - "ontos/core/history.py"
    - "ontos/core/paths.py"
  forbidden_symbols: []
  cardinality_assertions:
    - name: "Package metadata agrees on v5.0.1"
      command: "${ONTOS_PYTHON} -c 'import ontos, pathlib, tomllib; data=tomllib.loads(pathlib.Path(\"pyproject.toml\").read_text()); assert ontos.__version__ == data[\"project\"][\"version\"] == \"5.0.1\"'"
      expect: "exit-0"
    - name: "No personal portfolio default remains in runtime code"
      command: "! rg -n '(~/Dev|[.]dev-hub)' ontos/mcp/portfolio_config.py ontos/cli.py"
      expect: "exit-0"
    - name: "Release workflow has no skip-existing or production fallback"
      command: "! rg -n '(skip-existing|extra-index-url|https://pypi[.]org/simple)' .github/workflows/publish.yml scripts/release_artifacts.py"
      expect: "exit-0"
  cleanliness:
    pathspecs: []
    exclude_pathspecs: ["review-board/.external/"]

artifacts:
  spec: "docs/specs/project-ontos-audit-tail-config-provenance-spec.md"
  family_verdict: "docs/reviews/project-ontos-audit-tail-config-provenance/<phase>-<family>-<role>.md"
  canonical_verdict: "docs/reviews/project-ontos-audit-tail-config-provenance/<phase>-verdict.md"
  product_verdict: "docs/reviews/project-ontos-audit-tail-config-provenance/<phase>-<family>-product.md"
  fix_summary: "docs/reviews/project-ontos-audit-tail-config-provenance/D.4-fix-summary.md"
  verification: "docs/reviews/project-ontos-audit-tail-config-provenance/D.5-<family>-verifier.md"
  final_approval: "docs/reviews/project-ontos-audit-tail-config-provenance/final-approval.md"
  retro: "docs/retros/project-ontos-audit-tail-config-provenance-retro.md"

model_assignments:
  - phase: "A"
    assignments: {codex: spec-author}
  - phase: "B.1"
    assignments: {claude: adversarial, gemini: alignment, glm: peer}
  - phase: "B.1"
    assignments: {claude: product}
  - phase: "B.2"
    assignments: {claude: alignment, gemini: peer, glm: adversarial}
  - phase: "B.2"
    assignments: {claude: product}
  - phase: "B.3"
    assignments: {codex: meta-consolidator}
  - phase: "C"
    assignments: {codex: implementation-author}
  - phase: "D.1"
    assignments: {claude: peer}
  - phase: "D.2"
    assignments: {claude: peer, gemini: adversarial, glm: alignment}
  - phase: "D.2"
    assignments: {claude: product}
  - phase: "D.3"
    assignments: {codex: meta-consolidator}
  - phase: "D.4"
    assignments: {codex: fix-author}
  - phase: "D.5"
    assignments: {claude: verifier, gemini: verifier, glm: verifier}
  - phase: "D.6"
    assignments: {codex: final-approval}
  - phase: "E"
    assignments: {codex: retro}

cli_capability_matrix:
  codex: {shell: true, git: true, test_runner: true, doc_index: true}
  claude: {shell: true, git: true, test_runner: true, doc_index: true}
  gemini:
    shell: false
    git: false
    test_runner: false
    doc_index: true
    evidence_cap: static-inspection
    writes_files_non_interactively: false
  glm: {shell: true, git: true, test_runner: true, doc_index: true}

smoke_checks:
  - phase: "C"
    checks:
      - name: "PR D focused regressions"
        command: "PYTHONPATH=. ${ONTOS_PYTHON} -m pytest -q tests/commands/test_consolidate_root_regression.py tests/commands/test_maintain.py tests/commands/test_verify_portfolio.py tests/mcp/test_context_bundle_config.py tests/mcp/test_portfolio_config.py tests/mcp/test_read_only_registration.py tests/test_cli_contract_v4.py tests/test_release_artifacts.py tests/test_version.py tests/commands/test_doctor_phase4.py::TestDoctorCommand::test_returns_exit_code_0_when_checks_pass_or_only_warn"
        expect: "exit-0"
      - name: "Complete Ontos suite"
        command: "PYTHONPATH=. ${ONTOS_PYTHON} -m pytest -q"
        expect: "exit-0"
      - name: "Release artifact verifier compiles"
        command: "${ONTOS_PYTHON} -m compileall -q scripts/release_artifacts.py"
        expect: "exit-0"
      - name: "Document graph is valid"
        command: "${ONTOS_PYTHON} -m ontos link-check --no-orphans --quiet"
        expect: "exit-0"
  - phase: "D.5"
    checks:
      - name: "Post-review complete suite"
        command: "PYTHONPATH=. ${ONTOS_PYTHON} -m pytest -q"
        expect: "exit-0"

