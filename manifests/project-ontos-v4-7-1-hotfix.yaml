  spec: "docs/specs/project-ontos-v4-7-1-hotfix-spec.md"
  family_verdict: "docs/reviews/project-ontos-v4-7-1-hotfix/<phase>-<family>-<role>.md"
  canonical_verdict: "docs/reviews/project-ontos-v4-7-1-hotfix/<phase>-verdict.md"
  product_verdict: "docs/reviews/project-ontos-v4-7-1-hotfix/<phase>-<family>-product.md"
