  codex:
    shell: true
    git: true
    test_runner: true
    doc_index: true
  claude:
    shell: true
    git: true
    test_runner: true
    doc_index: true
  gemini:
    shell: false
    git: false
    test_runner: false
    doc_index: true
    evidence_cap: static-inspection
    writes_files_non_interactively: false
    execution_clis:
      agy:
        expected_version_regex: "^[0-9]+[.][0-9]+[.][0-9]+"
        writes_files_non_interactively: false
  glm:
    shell: true
    git: true
    test_runner: true
    doc_index: true

smoke_checks:
  - phase: "C"
    checks:
      - name: "Focused serializer, writer, and MCP security regressions"
        command: "PATH=\"$PWD/.venv/bin:$PATH\" .venv/bin/python -m pytest -q tests/core/test_schema.py tests/core/test_frontmatter_edit_pipeline.py tests/test_frontmatter_roundtrip_regression.py tests/test_session_context.py tests/test_context_contention.py tests/mcp/test_locking.py tests/mcp/test_write_tools.py tests/mcp/test_read_only_registration.py tests/commands/test_log.py tests/commands/test_retrofit.py tests/test_doctor_mcp_probe_regression.py"
        expect: "exit-0"
  - phase: "D.2"
    checks:
      - name: "Complete hotfix test suite"
        command: "PATH=\"$PWD/.venv/bin:$PATH\" .venv/bin/python -m pytest -q"
        expect: "exit-0"
  - phase: "D.5"
    checks:
      - name: "Post-review complete suite"
        command: "PATH=\"$PWD/.venv/bin:$PATH\" .venv/bin/python -m pytest -q"
        expect: "exit-0"

