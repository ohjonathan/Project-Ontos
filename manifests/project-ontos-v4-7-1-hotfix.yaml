  allowed_path_patterns:
    - "docs/reviews/project-ontos-v4-7-1-hotfix/**"
  composition_targets:
    - path: "ontos/commands/doctor.py"
      rationale: "The #147 code fix is already in the main base and is verified but not modified by this focused branch."
      shares_with_deliverable_id: "project-ontos-audit-doctor-rce"
    - path: "ontos/core/cursor_mcp.py"
      rationale: "The #147 exact-argv inspection fix is inherited from main and is verified without relabeling its evidence."
      shares_with_deliverable_id: "project-ontos-audit-doctor-rce"
    - path: "ontos/core/mcp_shared.py"
      rationale: "The managed-launcher probe primitive is inherited from main."
      shares_with_deliverable_id: "project-ontos-audit-doctor-rce"
  forbidden_paths:
    - "ontos/cli.py"
    - "ontos/command_registry.py"
    - "ontos/ui/json_output.py"
    - "ontos/commands/link_check.py"
    - "ontos/commands/map.py"
    - "ontos/commands/stub.py"
    - "ontos/commands/activate.py"
    - "ontos/core/body_refs.py"
    - "ontos/core/graph.py"
    - "ontos/core/link_diagnostics.py"
    - "ontos/mcp/schemas.py"
    - "tests/golden/"
    - "tests/commands/golden/"
    - ".github/workflows/publish.yml"
    - ".pre-commit-config.yaml"
    - ".ontos/hooks/"
    - "ontos/_hooks/"
    - "docs/reviews/project-ontos-audit-rebaseline-remediation/"
    - "manifests/project-ontos-audit-rebaseline-remediation.yaml"
    - ".llm-dev/framework/"
    - ".venv/"
    - ".git/"
  forbidden_symbols: []
  cardinality_assertions:
    - name: "Package version is exactly 4.7.1"
      command: "PATH=\"$PWD/.venv/bin:$PATH\" python -c \"import ontos; print(ontos.__version__)\""
      expect: "literal:4.7.1"
    - name: "Command envelope remains schema 3.4"
      command: "PATH=\"$PWD/.venv/bin:$PATH\" python -c \"import io,json,sys; from ontos.ui.json_output import emit_command_success,emit_command_error; b=io.StringIO(); old=sys.stdout; sys.stdout=b; emit_command_success(command='gate',exit_code=0,message='ok'); emit_command_error(command='gate',exit_code=1,code='E',message='bad'); sys.stdout=old; expected={'schema_version','command','status','exit_code','message','data','warnings','error'}; rows=[json.loads(x) for x in b.getvalue().splitlines()]; assert all(set(r)==expected and r['schema_version']=='3.4' and 'result' not in r for r in rows); print('3.4')\""
      expect: "literal:3.4"
    - name: "No v5 command registry exists"
      command: "test ! -e ontos/command_registry.py"
      expect: "exit-0"
  cleanliness:
    pathspecs: []
    exclude_pathspecs: []

