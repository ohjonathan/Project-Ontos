gate_prerequisites:
  - id: G-test-1
    category: test
    description: "Focused serializer, secure-writer, locking, MCP, log, and doctor regressions pass."
    verification:
      command: "PATH=\"$PWD/.venv/bin:$PATH\" .venv/bin/python -m pytest -q tests/core/test_schema.py tests/core/test_frontmatter_edit_pipeline.py tests/test_frontmatter_roundtrip_regression.py tests/test_session_context.py tests/test_context_contention.py tests/mcp/test_locking.py tests/mcp/test_write_tools.py tests/mcp/test_read_only_registration.py tests/commands/test_log.py tests/commands/test_retrofit.py tests/test_doctor_mcp_probe_regression.py"
      expect: "exit-0"
  - id: G-test-2
    category: test
    description: "The complete suite passes from a clean tree and leaves tracked and untracked status unchanged."
    verification:
      command: "test -z \"$(git status --porcelain=v1 --untracked-files=all)\" && PATH=\"$PWD/.venv/bin:$PATH\" .venv/bin/python -m pytest -q && test -z \"$(git status --porcelain=v1 --untracked-files=all)\""
      expect: "exit-0"
  - id: G-contract-1
    category: test
    description: "All major-only command, envelope, graph, schema, and golden paths are byte-identical to main."
    verification:
      command: "git diff --exit-code bf91b42f4eb5ba2ed6e0e3ea5e76d22ec6d7ec95 -- ontos/cli.py ontos/ui/json_output.py ontos/commands/link_check.py ontos/commands/map.py ontos/commands/stub.py ontos/commands/activate.py ontos/core/body_refs.py ontos/core/graph.py ontos/core/link_diagnostics.py ontos/mcp/schemas.py tests/golden tests/commands/golden tests/ui/test_json_output.py tests/commands/test_link_check.py tests/core/test_graph.py tests/core/test_link_diagnostics.py tests/mcp/test_workspace_overview.py"
      expect: "exit-0"
  - id: G-contract-2
    category: cardinality
    description: "Schema-3.4 envelopes retain the baseline key set and contain no v5 result object."
    verification:
      command: >-
        PATH="$PWD/.venv/bin:$PATH" python -c "import io,json,sys; from ontos.ui.json_output import emit_command_success,emit_command_error; b=io.StringIO(); old=sys.stdout; sys.stdout=b; emit_command_success(command='gate',exit_code=0,message='ok'); emit_command_error(command='gate',exit_code=1,code='E',message='bad'); sys.stdout=old; expected={'schema_version','command','status','exit_code','message','data','warnings','error'}; rows=[json.loads(x) for x in b.getvalue().splitlines()]; assert all(set(r)==expected and r['schema_version']=='3.4' and 'result' not in r for r in rows); print('3.4')"
      expect: "exit-0"
  - id: G-golden-1
    category: scope
    description: "Tracked golden baselines and command goldens are unchanged from main."
    verification:
      command: "git diff --exit-code bf91b42f4eb5ba2ed6e0e3ea5e76d22ec6d7ec95 -- tests/golden/baselines tests/commands/golden"
      expect: "exit-0"
  - id: G-scope-1
    category: scope
    description: "Every committed, staged, unstaged, and untracked deliverable path is within the focused manifest."
    verification:
      command: "bash .llm-dev/framework/scripts/verify-changed-path-scope.sh --manifest manifests/project-ontos-v4-7-1-hotfix.yaml --base bf91b42f4eb5ba2ed6e0e3ea5e76d22ec6d7ec95"
      expect: "exit-0"
  - id: G-version-1
    category: cardinality
    description: "Both version sources and the imported package report 4.7.1."
    verification:
      command: >-
        PATH="$PWD/.venv/bin:$PATH" python -c "from pathlib import Path; import ontos; assert ontos.__version__=='4.7.1'; assert 'version = \"4.7.1\"' in Path('pyproject.toml').read_text(); assert '__version__ = \"4.7.1\"' in Path('ontos/__init__.py').read_text()"
      expect: "exit-0"
  - id: G-doctor-1
    category: test
    description: "The inherited #147 exact-argv remediation remains green."
    verification:
      command: "PATH=\"$PWD/.venv/bin:$PATH\" .venv/bin/python -m pytest -q tests/test_doctor_mcp_probe_regression.py"
      expect: "exit-0"
  - id: G-diff-1
    category: scope
    description: "The hotfix diff has no whitespace errors."
    verification:
      command: "git diff --check bf91b42f4eb5ba2ed6e0e3ea5e76d22ec6d7ec95"
      expect: "exit-0"
  - id: G-branch-1
    category: branch
    description: "The focused branch is based on the declared main baseline."
    verification:
      command: "test \"$(git merge-base bf91b42f4eb5ba2ed6e0e3ea5e76d22ec6d7ec95 HEAD)\" = bf91b42f4eb5ba2ed6e0e3ea5e76d22ec6d7ec95"
      expect: "exit-0"
  - id: G-verdict-1
    category: verdict-presence
    description: "Canonical design and implementation verdicts plus all three current-head verifier artifacts exist."
    verification:
      command: >-
        test -s docs/reviews/project-ontos-v4-7-1-hotfix/B.3-verdict.md &&
        test -s docs/reviews/project-ontos-v4-7-1-hotfix/D.3-verdict.md &&
        test -s docs/reviews/project-ontos-v4-7-1-hotfix/D.5-claude-verifier.md &&
        test -s docs/reviews/project-ontos-v4-7-1-hotfix/D.5-gemini-verifier.md &&
        test -s docs/reviews/project-ontos-v4-7-1-hotfix/D.5-glm-verifier.md
      expect: "exit-0"
  - id: G-blocker-1
    category: blocker-closure
    description: "D.3 contains no unresolved implementation blocker before verifier dispatch."
    verification:
      command: >-
        test -s docs/reviews/project-ontos-v4-7-1-hotfix/D.3-verdict.md &&
        ! awk '/^## Preserved blockers/{f=1;next} /^## /{f=0} f' docs/reviews/project-ontos-v4-7-1-hotfix/D.3-verdict.md |
        grep -E '^- \*\*ID:\*\*'
      expect: "exit-0"

