manifest_version: "2.0.0"
id: project-ontos-v4-7-1-hotfix
slug: project-ontos-v4-7-1-hotfix
summary: "Contract-preserving v4.7.1 hotfix for frontmatter corruption, filesystem safety, doctor RCE, and read-only MCP writes."

lifecycle_mode: framework lifecycle
deliverable_type: standard
user_facing: true
fallback_evidence_mode: strict_p3
require_lifecycle_dispatch_bundles: true
strict_p3_required_phases: ["B.1", "D.2", "D.5"]

implementation_sequencing:
  mode: code-first-user-gated
  user_gate_ref: "maintainer decision in Codex task: split PR #161 by observable contract and prioritize v4.7.1"
  implementation_ref: "ca1d08932b4e99b958157a118768f40fc152ad64"
  rationale: "The maintainer explicitly authorized reconstructing the urgent P0 hotfix from the already-reviewed PR #161 tree; Phase A and all review evidence are regenerated against this focused branch and are not inherited from PR #161."

owners:
  - "Project Ontos Maintainers"

authorship:
  deliverable_author_families: [codex]
  structural_orchestrator_families: [codex]

