    intent_path: "docs/reviews/project-ontos-audit-tail-dead-code/B.1-dispatch-intent.yaml"
    result_path: "docs/reviews/project-ontos-audit-tail-dead-code/B.1-dispatch-result.yaml"
  - phase: "B.2"
