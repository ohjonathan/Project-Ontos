  mode: recommendation_only

cross_repo_dependencies: []
historical_receipt_gaps: []
gate_only_invariants: []
convergence_metrics: []

gate_env:
  - name: ONTOS_PYTHON
    description: "Python interpreter with repository development and build dependencies installed."
    example: "ONTOS_PYTHON=/Users/jonathanoh/Developer/workspaces/Project-Ontos/.venv/bin/python"
    required: true
    scope: both

gate_prerequisites:
  - id: G-test-1
    category: test
    description: "The focused PR B regression suite passes."
    verification: {command: "PYTHONPATH=. ${ONTOS_PYTHON} -m pytest -q tests/commands/test_agents.py tests/commands/test_doctor_phase4.py tests/commands/test_export_phase4.py tests/commands/test_hook_phase4.py tests/commands/test_init_phase3.py tests/commands/test_instruction_protocol.py tests/commands/test_map_obsidian.py tests/commands/test_map_resilience.py tests/commands/test_migrate_parity.py tests/commands/test_migration_report_parity.py tests/commands/test_verify_parity.py tests/core/test_paths_runtime_root.py tests/core/test_paths_v2_deprecation.py tests/mcp/test_error_paths.py tests/mcp/test_module_exports.py tests/mcp/test_scanner.py", expect: "exit-0"}
  - id: G-test-2
    category: test
    description: "The complete Ontos suite passes except the separately approved PR C WAL/SHM flake."
    verification: {command: "PYTHONPATH=. ${ONTOS_PYTHON} -m pytest -q", expect: "exit-0"}
  - id: G-scope-1
    category: scope
    description: "No later-phase consistency, config, provenance, archive, release, or breaking-removal surface changed."
    verification: {command: "git diff --name-only origin/main -- .github docs/releases .ontos-internal/archive .project-internal ontos/commands/consolidate.py ontos/io/snapshot.py ontos/mcp/cache.py ontos/mcp/portfolio_config.py", expect: "empty"}
  - id: G-cardinality-1
    category: cardinality
    description: "Exactly eleven tracked backup files are deleted."
    verification: {command: "test \"$(git diff --name-only --diff-filter=D origin/main -- '.ontos/backups/*.bak' | wc -l | tr -d ' ')\" = 11", expect: "exit-0"}
  - id: G-cardinality-2
    category: cardinality
    description: "Dead packages, obsolete module, and package-data entries are gone."
    verification: {command: "${ONTOS_PYTHON} -c 'from pathlib import Path; assert not Path(\"ontos/_templates\").exists(); assert not Path(\"ontos/_hooks\").exists(); assert not Path(\"ontos/io/obsidian.py\").exists(); p=Path(\"pyproject.toml\").read_text(); assert \"ontos._templates\" not in p and \"ontos._hooks\" not in p'", expect: "exit-0"}
  - id: G-cardinality-3
    category: cardinality
    description: "The eleven-name path compatibility surface remains available for v5.0.1."
    verification: {command: "PYTHONPATH=. ${ONTOS_PYTHON} -m pytest -q tests/core/test_paths_v2_deprecation.py", expect: "exit-0"}
  - id: G-verdict-1
    category: verdict-presence
    description: "Canonical B.3/D.3 verdicts and three D.5 verifier artifacts exist."
    verification: {command: "test -f docs/reviews/project-ontos-audit-tail-dead-code/B.3-verdict.md && test -f docs/reviews/project-ontos-audit-tail-dead-code/D.3-verdict.md && test \"$(find docs/reviews/project-ontos-audit-tail-dead-code -name 'D.5-*-verifier.md' | wc -l | tr -d ' ')\" = 3", expect: "exit-0"}
  - id: G-blocker-1
    category: blocker-closure
    description: "No preserved blocker remains in the canonical D.3 verdict."
    verification: {command: "test -f docs/reviews/project-ontos-audit-tail-dead-code/D.3-verdict.md && ! grep -q 'status: preserved' docs/reviews/project-ontos-audit-tail-dead-code/D.3-verdict.md", expect: "exit-0"}
  - id: G-branch-1
    category: branch
    description: "The branch remains based on the current origin/main review baseline."
    verification: {command: "test \"$(git merge-base origin/main HEAD)\" = \"$(git rev-parse origin/main)\"", expect: "exit-0"}

