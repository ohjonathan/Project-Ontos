    relevance: "Original evidence for the nine removal findings and path compatibility finding."
  - path: "docs/trackers/project-ontos-audit-remediation-release-line.md"
    relevance: "Authoritative sequential release split and reconciliation arithmetic."

watch_item: "This PR may resolve only the nine PR B patch-safe removal findings and the v5.0.1 deprecation half of D5b-dead-code-3. Version metadata, release actions, PR C/D behavior, archive slimming, test hygiene, consolidation dogfood, and the v6 removal remain out of scope."
