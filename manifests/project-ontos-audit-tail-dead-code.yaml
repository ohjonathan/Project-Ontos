manifest_version: "2.0.1"
id: project-ontos-audit-tail-dead-code
slug: project-ontos-audit-tail-dead-code
summary: "Remove nine patch-safe dead-code findings and deprecate the eleven-name v2 path compatibility API for v6.0.0."

lifecycle_mode: framework lifecycle
deliverable_type: standard
user_facing: true
fallback_evidence_mode: strict_p3
require_lifecycle_dispatch_bundles: true
strict_p3_required_phases: ["B.1", "D.2", "D.5"]

owners: ["Project Ontos Maintainers"]
authorship:
  deliverable_author_families: [codex]
  structural_orchestrator_families: [codex]

implementation_sequencing:
  mode: code-first-user-gated
  user_gate_ref: "Maintainer dispatch for sequential PR B after merged PR A #167."
  implementation_ref: "codex/audit-tail-dead-code from origin/main@d6eca479d5c5d71b2335e3ee2abad4f8d2651e3e"
  rationale: "The maintainer supplied a decision-complete public-surface rule and requested review of the verified runnable diff."

scope:
  allowed_paths:
    - ".ontos/backups/"
    - "AGENTS.md"
    - "Ontos_Context_Map.md"
    - "docs/specs/project-ontos-audit-tail-dead-code-spec.md"
    - "docs/trackers/project-ontos-audit-tail-dead-code.md"
    - "docs/trackers/project-ontos-audit-remediation-release-line.md"
    - "docs/retros/project-ontos-audit-tail-dead-code-retro.md"
    - "manifests/project-ontos-audit-tail-dead-code.yaml"
    - "ontos/_hooks/"
    - "ontos/_templates/"
    - "ontos/cli.py"
    - "ontos/commands/claude_template.py"
    - "ontos/commands/export_claude.py"
    - "ontos/commands/init.py"
    - "ontos/commands/instruction_protocol.py"
    - "ontos/commands/maintain.py"
    - "ontos/commands/migrate.py"
    - "ontos/commands/migrate_cmd.py"
    - "ontos/commands/migration_report.py"
    - "ontos/commands/verify.py"
    - "ontos/core/paths.py"
    - "ontos/core/schema.py"
    - "ontos/io/obsidian.py"
    - "ontos/mcp/scanner.py"
    - "ontos/mcp/tools.py"
    - "pyproject.toml"
    - "tests/commands/test_agents.py"
    - "tests/commands/test_export_phase4.py"
    - "tests/commands/test_export_data_parity.py"
    - "tests/commands/test_instruction_protocol.py"
    - "tests/commands/test_map_obsidian.py"
    - "tests/core/test_paths_v2_deprecation.py"
  allowed_path_patterns:
    - "docs/logs/*audit-tail-dead-code*.md"
    - "docs/reviews/project-ontos-audit-tail-dead-code/**"
  composition_targets:
    - path: "docs/reviews/2026-07-02-fable-repo-audit.md"
      rationale: "Read-only source for D5b-dead-code-2/3/6/8/9/10, D5a-repo-redundancy-3/6, D3b-structure-7, and D7-cli-consistency-9 evidence."
      shares_with_deliverable_id: "project-ontos-audit-remediation-2026-07"
    - path: "docs/trackers/project-ontos-audit-tail-docs.md"
      rationale: "Read-only evidence that PR A completed locally and subsequently merged as #167."
      shares_with_deliverable_id: "project-ontos-audit-tail-docs"
  forbidden_paths:
    - ".github/"
    - ".ontos-internal/archive/"
    - ".project-internal/"
    - "docs/releases/"
    - "ontos/commands/consolidate.py"
    - "ontos/io/snapshot.py"
    - "ontos/mcp/cache.py"
    - "ontos/mcp/portfolio_config.py"
    - ".llm-dev/framework/"
    - ".venv/"
    - "dist/"
    - "build/"
  forbidden_symbols: []
  cardinality_assertions:
    - name: "Exactly eleven tracked backup files are deleted"
      command: "git diff --name-only --diff-filter=D origin/main -- '.ontos/backups/*.bak' | wc -l | tr -d ' '"
      expect: "eq:11"
    - name: "Dead packages and module are absent from source and package-data"
      command: "${ONTOS_PYTHON} -c 'from pathlib import Path; assert not Path(\"ontos/_templates\").exists(); assert not Path(\"ontos/_hooks\").exists(); assert not Path(\"ontos/io/obsidian.py\").exists(); p=Path(\"pyproject.toml\").read_text(); assert \"ontos._templates\" not in p and \"ontos._hooks\" not in p'"
      expect: "exit-0"
    - name: "Audited dead definitions and shim imports are gone"
      command: "! rg -n 'def (export_claude_command|migration_report_command|migrate_convenience_command|tool_error|verify_document|get_schema_info|check_file_needs_migration|_load_docs_for_graph|_load_registry_records|_create_directories|_cmd_export)\\b|from ontos[.]commands[.](claude_template|instruction_protocol)' ontos"
      expect: "exit-0"
    - name: "Eleven legacy path names remain importable"
      command: "${ONTOS_PYTHON} -c 'import ontos, ontos.core; from ontos.core import paths; names=(\"PROJECT_ROOT\",\"get_logs_dir\",\"get_log_count\",\"get_logs_older_than\",\"get_archive_dir\",\"get_decision_history_path\",\"get_proposals_dir\",\"get_archive_logs_dir\",\"get_archive_proposals_dir\",\"get_concepts_path\",\"find_last_session_date\"); assert len(names)==11; assert all(hasattr(paths,n) for n in names); assert all(hasattr(ontos,n) and hasattr(ontos.core,n) for n in names[1:])'"
      expect: "exit-0"
    - name: "Package version remains release-action neutral"
      command: "${ONTOS_PYTHON} -c 'import ontos; assert ontos.__version__ == \"5.0.0\"'"
      expect: "exit-0"
  cleanliness:
    pathspecs: []
    exclude_pathspecs: ["review-board/.external/"]

artifacts:
  spec: "docs/specs/project-ontos-audit-tail-dead-code-spec.md"
  family_verdict: "docs/reviews/project-ontos-audit-tail-dead-code/<phase>-<family>-<role>.md"
  canonical_verdict: "docs/reviews/project-ontos-audit-tail-dead-code/<phase>-verdict.md"
  product_verdict: "docs/reviews/project-ontos-audit-tail-dead-code/<phase>-<family>-product.md"
  fix_summary: "docs/reviews/project-ontos-audit-tail-dead-code/D.4-fix-summary.md"
  verification: "docs/reviews/project-ontos-audit-tail-dead-code/D.5-<family>-verifier.md"
  final_approval: "docs/reviews/project-ontos-audit-tail-dead-code/final-approval.md"
  retro: "docs/retros/project-ontos-audit-tail-dead-code-retro.md"

model_assignments:
  - phase: "A"
    assignments: {codex: spec-author}
  - phase: "B.1"
    assignments: {claude: adversarial, gemini: alignment, glm: peer}
  - phase: "B.1"
    assignments: {claude: product}
  - phase: "B.2"
    assignments: {claude: alignment, gemini: peer, glm: adversarial}
  - phase: "B.2"
    assignments: {claude: product}
  - phase: "B.3"
    assignments: {codex: meta-consolidator}
  - phase: "C"
    assignments: {codex: implementation-author}
  - phase: "D.1"
    assignments: {claude: peer}
  - phase: "D.2"
    assignments: {claude: peer, gemini: adversarial, glm: alignment}
  - phase: "D.2"
    assignments: {claude: product}
  - phase: "D.3"
    assignments: {codex: meta-consolidator}
  - phase: "D.4"
    assignments: {codex: fix-author}
  - phase: "D.5"
    assignments: {claude: verifier, gemini: verifier, glm: verifier}
  - phase: "D.6"
    assignments: {codex: final-approval}
  - phase: "E"
    assignments: {codex: retro}

cli_capability_matrix:
  codex: {shell: true, git: true, test_runner: true, doc_index: true}
  claude: {shell: true, git: true, test_runner: true, doc_index: true}
  gemini:
    shell: false
    git: false
    test_runner: false
    doc_index: true
    evidence_cap: static-inspection
    writes_files_non_interactively: false
  glm: {shell: true, git: true, test_runner: true, doc_index: true}

smoke_checks:
  - phase: "C"
    checks:
      - name: "PR B focused regressions"
        command: "PYTHONPATH=. ${ONTOS_PYTHON} -m pytest -q tests/commands/test_agents.py tests/commands/test_doctor_phase4.py tests/commands/test_export_phase4.py tests/commands/test_hook_phase4.py tests/commands/test_init_phase3.py tests/commands/test_instruction_protocol.py tests/commands/test_map_obsidian.py tests/commands/test_map_resilience.py tests/commands/test_migrate_parity.py tests/commands/test_migration_report_parity.py tests/commands/test_verify_parity.py tests/core/test_paths_runtime_root.py tests/core/test_paths_v2_deprecation.py tests/mcp/test_error_paths.py tests/mcp/test_module_exports.py tests/mcp/test_scanner.py"
        expect: "exit-0"
      - name: "Complete Ontos suite"
        command: "PYTHONPATH=. ${ONTOS_PYTHON} -m pytest -q"
        expect: "exit-0"
      - name: "Document graph is valid"
        command: "${ONTOS_PYTHON} -m ontos link-check --no-orphans --quiet"
        expect: "exit-0"
  - phase: "D.5"
    checks:
      - name: "Post-review complete suite"
        command: "PYTHONPATH=. ${ONTOS_PYTHON} -m pytest -q"
        expect: "exit-0"

